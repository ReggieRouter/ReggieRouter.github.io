name: Sanitize waterfall.html

on:
  push:
    paths:
      - waterfall.html

jobs:
  escape-script-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Escape </script> tags in lender source_snippets
        id: fix
        run: |
          python3 - <<'PYEOF'
          import re, os, sys

          with open("waterfall.html", "r") as f:
              content = f.read()

          try:
              script_start = content.rindex("<script>")
              script_end = content.rindex("</script>")
          except ValueError:
              print("No script block found — skipping")
              sys.exit(0)

          body = content[script_start:script_end]
          fixed_body = re.sub(r"<(/script)", r"<\/\1", body, flags=re.IGNORECASE)

          if fixed_body == body:
              print("No unescaped </script> tags found — file is clean")
              sys.exit(0)

          count = len(re.findall(r"</script", body, re.IGNORECASE))
          print(f"Auto-escaped {count} </script> tag(s) in source_snippets")

          with open("waterfall.html", "w") as f:
              f.write(content[:script_start] + fixed_body + content[script_end:])

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh_out:
              gh_out.write("fixed=true\n")
          PYEOF

      - name: Commit fix if needed
        if: steps.fix.outputs.fixed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add waterfall.html
          git commit -m "fix: auto-escape </script> tags in waterfall.html source_snippets [bot]"
          git push

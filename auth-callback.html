<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in — LendPaper</title>
  <link rel="icon" type="image/svg+xml" href="/public/assets/brand/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F8FAF7; color: #0D1A10; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(0,0,0,0.08); border-top-color: #2D6A4F; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6B7C70; font-size: 14px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Signing you in...</p>
  <script type="importmap">{"imports":{"@supabase/supabase-js":"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"}}</script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showError(msg) {
      document.querySelector('.spinner').style.display = 'none';
      const p = document.querySelector('p');
      p.textContent = 'Sign-in hit a snag: ' + msg + ' ';
      const a = document.createElement('a');
      a.href = '/login.html';
      a.textContent = '← Back to login';
      a.style.color = '#2D6A4F';
      p.appendChild(document.createElement('br'));
      p.appendChild(a);
    }

    // Supabase reports failures as error params (query or hash) — surface them instead of bouncing
    const qs = new URLSearchParams(window.location.search);
    const hs = new URLSearchParams(window.location.hash.slice(1));
    const errMsg = qs.get('error_description') || hs.get('error_description') || qs.get('error') || hs.get('error');
    if (errMsg) { showError(decodeURIComponent(errMsg.replace(/\+/g, ' '))); throw new Error(errMsg); }

    // Wait for the client to establish the session — token parsing can outlast a fixed delay
    const session = await new Promise((resolve) => {
      let done = false;
      const finish = (s) => { if (!done) { done = true; resolve(s); } };
      supabase.auth.onAuthStateChange((event, s) => { if (s) finish(s); });
      supabase.auth.getSession().then(({ data: { session: s } }) => { if (s) finish(s); });
      setTimeout(() => finish(null), 6000);
    });
    if (!session) {
      // Diagnose: did the provider redirect even deliver credentials?
      const code = qs.get('code');
      const hasToken = hs.get('access_token');
      if (code) {
        const { error: xerr } = await supabase.auth.exchangeCodeForSession(code);
        if (xerr) {
          showError('Code exchange failed: ' + xerr.message);
        } else {
          window.location.replace('/auth-callback.html'); // session stored — re-run routing clean
        }
      } else if (hasToken) {
        showError('Token arrived but the session could not be stored. Please try again.');
      } else {
        showError('Arrived without credentials — the sign-in redirect dropped them (no code or access_token in URL).');
      }
    } else {
      const { data: profile } = await supabase.from('profiles').select('id, status, is_admin').eq('id', session.user.id).single();
      if (!profile) {
        window.location.href = '/onboarding.html';
      } else if (profile.is_admin) {
        window.location.href = '/lp-panel.html'; // admin page folded into lp-panel Members tab (LEN-84)
      } else if (profile.status === 'pending') {
        window.location.href = '/pending.html';
      } else if (profile.status === 'waitlist') {
        window.location.href = '/waitlist.html';
      } else if (profile.status === 'denied') {
        window.location.href = '/waitlist.html'; // denied → waitlist page, soft landing
      } else if (profile.status === 'approved') {
        const next = sessionStorage.getItem('redirectAfterLogin') || '/index.html';
        sessionStorage.removeItem('redirectAfterLogin');
        window.location.href = next;
      } else {
        window.location.href = '/pending.html';
      }
    }
  </script>
</body>
</html>

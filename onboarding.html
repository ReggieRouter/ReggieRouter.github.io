<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Your Profile — LendPaper</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0d14; --surface: #111520; --border: #1e2535;
      --gold: #e8b84b; --text: #e2e8f0; --muted: #64748b;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(232,184,75,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,184,75,0.03) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px; width: 100%; max-width: 440px;
      position: relative; z-index: 1; animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .logo { display:flex; align-items:center; gap:10px; margin-bottom:36px; }
    .logo-mark { width:36px; height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:16px; color:var(--bg); }
    .logo-text { font-family:'Syne',sans-serif; font-weight:700; font-size:20px; letter-spacing:-0.02em; }
    .step-label { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--gold); font-weight:500; margin-bottom:12px; }
    h1 { font-family:'Syne',sans-serif; font-weight:700; font-size:24px; letter-spacing:-0.03em; margin-bottom:8px; }
    .subtitle { font-size:14px; color:var(--muted); margin-bottom:32px; line-height:1.5; }
    .field { margin-bottom:20px; }
    label { display:block; font-size:12px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
    input, select {
      width:100%; padding:13px 16px; background:var(--bg);
      border:1px solid var(--border); border-radius:10px;
      color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
      outline:none; transition:border-color 0.2s; appearance:none;
    }
    input:focus, select:focus { border-color:var(--gold); }
    input::placeholder { color:var(--muted); }
    select option { background:var(--surface); }
    .select-wrap { position:relative; }
    .select-wrap::after { content:'↓'; position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:13px; }
    .btn {
      width:100%; padding:14px; background:var(--gold); color:var(--bg);
      border:none; border-radius:10px; font-family:'DM Sans',sans-serif;
      font-weight:500; font-size:15px; cursor:pointer;
      transition:opacity 0.2s, transform 0.1s; margin-top:8px;
    }
    .btn:hover { opacity:0.9; transform:translateY(-1px); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .message { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
    .message.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#f87171; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">LP</div>
      <span class="logo-text">LendPaper</span>
    </div>
    <div class="step-label">Step 1 of 1</div>
    <h1>Complete your profile</h1>
    <p class="subtitle">Tell us a bit about yourself so we can get you set up.</p>

    <div id="message" class="message"></div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Jane Smith" />
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="company" placeholder="Acme Capital LLC" />
    </div>
    <div class="field">
      <label>Your Role</label>
      <div class="select-wrap">
        <select id="role">
          <option value="" disabled selected>Select your role...</option>
          <option value="broker">Commercial Broker</option>
          <option value="iso">ISO</option>
          <option value="lender">Lender</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <button class="btn" id="submitBtn">Complete Setup →</button>
  </div>

  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm" } }
  </script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = '/login.html'; }

    // If profile already exists, skip onboarding
    const { data: existing } = await supabase.from('profiles').select('id').eq('id', session.user.id).single();
    if (existing) { window.location.href = '/pending.html'; }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const fullName = document.getElementById('fullName').value.trim();
      const company = document.getElementById('company').value.trim();
      const role = document.getElementById('role').value;
      const msg = document.getElementById('message');
      const btn = document.getElementById('submitBtn');

      if (!fullName || !company || !role) {
        msg.textContent = 'Please fill out all fields.';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      const { error } = await supabase.from('profiles').insert({
        id: session.user.id,
        email: session.user.email,
        full_name: fullName,
        company,
        role,
        status: 'pending'
      });

      if (error) {
        msg.textContent = error.message;
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Complete Setup →';
      } else {
        window.location.href = '/pending.html';
      }
    });
  </script>
</body>
</html>

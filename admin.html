  ║  SUPABASE SETUP — run this SQL in your Supabase SQL editor first     ║

  ║  ALTER TABLE profiles ADD COLUMN IF NOT EXISTS is_admin boolean      ║
  ║    DEFAULT false;                                                    ║
  ║  ALTER TABLE profiles ADD COLUMN IF NOT EXISTS invite_credits int    ║
  ║    DEFAULT 5;                                                        ║
  ║  ALTER TABLE profiles ADD COLUMN IF NOT EXISTS invites_sent int      ║
  ║    DEFAULT 0;                                                        ║
  ║  ALTER TABLE profiles ADD COLUMN IF NOT EXISTS approved_at           ║
  ║    timestamptz;                                                      ║
  ║  ALTER TABLE profiles ADD COLUMN IF NOT EXISTS status text           ║
  ║    DEFAULT 'pending';                                                ║
  ║                                                                      ║
  ║  -- Grant yourself admin:                                            ║
  ║  UPDATE profiles SET is_admin = true                                 ║
  ║    WHERE email = 'YOUR_EMAIL_HERE';                                  ║
  ║                                                                      ║
  ║  -- RLS policy for admin reads (add to profiles table):              ║
  ║  CREATE POLICY "Admin reads all profiles"                            ║
  ║    ON profiles FOR SELECT                                            ║
  ║    USING (auth.uid() IN (                                            ║
  ║      SELECT id FROM profiles WHERE is_admin = true                   ║
  ║    ));                                                               ║
  ║                                                                      ║
  ║  CREATE POLICY "Admin updates profiles"                              ║
  ║    ON profiles FOR UPDATE                                            ║
  ║    USING (auth.uid() IN (                                            ║

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8FAF7; --surface: #FFFFFF; --surface2: #F2F4F1;
      --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.12);
      --brand: #1A3C2E; --brand-mid: #2D6A4F; --brand-light: #34A878; --brand-vivid: #4ADE80;
      --gold: #B8870A; --gold-bg: rgba(184,135,10,0.07); --gold-bd: rgba(184,135,10,0.2);
      --text: #111827; --muted: #6B7280; --muted2: #3D5445;
      --red: #B91C1C; --red-bg: rgba(185,28,28,0.06); --red-bd: rgba(185,28,28,0.18);
      --amber: #92400E; --amber-bg: rgba(184,135,10,0.07); --amber-bd: rgba(184,135,10,0.2);
      --green-bg: rgba(52,168,120,0.08); --green-bd: rgba(52,168,120,0.22); --green-txt: #1A5C3A;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── TOP NAV ── */
    .topnav { position: sticky; top: 0; z-index: 50; background: rgba(248,250,247,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { display: flex; align-items: center; gap: 9px; }
    .nav-mark { width: 26px; height: 26px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    .nav-word { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; color: var(--text); letter-spacing: -0.02em; }
    .nav-word span { color: var(--brand-mid); }
    .nav-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; background: rgba(45,106,79,0.08); color: var(--brand-mid); border: 1px solid rgba(45,106,79,0.2); padding: 3px 9px; border-radius: 100px; margin-left: 4px; }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-refresh { font-size: 12px; color: var(--muted); cursor: pointer; background: none; border: none; font-family: 'Inter', sans-serif; transition: color .18s; display: flex; align-items: center; gap: 5px; }
    .nav-refresh:hover { color: var(--text); }
    .nav-signout { font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; background: none; border: 1px solid var(--border-mid); border-radius: 7px; padding: 5px 12px; font-family: 'Inter', sans-serif; transition: all .18s; }
    .nav-signout:hover { color: var(--text); border-color: rgba(0,0,0,0.2); background: var(--surface); }

    /* ── MAIN ── */
    .main { max-width: 1160px; margin: 0 auto; padding: 32px 28px 60px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
    .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-num { font-family: 'Anybody', sans-serif; font-stretch: 125%; font-weight: 700; font-size: 30px; letter-spacing: -0.01em; color: var(--text); }
    .stat-num.green { color: var(--brand-mid); }
    .stat-num.gold { color: var(--gold); }
    .stat-num.red { color: var(--red); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .tab { padding: 9px 18px; font-size: 13.5px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'Inter', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .18s, border-color .18s; display: flex; align-items: center; gap: 7px; }
    .tab.active { color: var(--brand-mid); border-bottom-color: var(--brand-mid); }
    .tab .count { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 1px 7px; color: var(--muted); transition: background .18s, color .18s; }
    .tab.active .count { background: rgba(45,106,79,0.1); border-color: rgba(45,106,79,0.2); color: var(--brand-mid); }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .search-wrap { position: relative; flex: 1; max-width: 340px; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--muted); stroke-width: 2; fill: none; pointer-events: none; }
    .search-input { width: 100%; padding: 9px 12px 9px 33px; background: var(--surface); border: 1px solid var(--border-mid); border-radius: 9px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13.5px; outline: none; transition: border-color .18s, box-shadow .18s; }
    .search-input:focus { border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(52,168,120,0.1); }
    .search-input::placeholder { color: var(--muted); opacity: .65; }
    .filter-select { padding: 9px 13px; background: var(--surface); border: 1px solid var(--border-mid); border-radius: 9px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; cursor: pointer; }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; }
    .btn-export { padding: 9px 14px; background: var(--bg); border: 1px solid var(--border-mid); border-radius: 9px; color: var(--muted2); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .18s; }
    .btn-export:hover { background: var(--surface); color: var(--text); }

    /* ── TABLE ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th { padding: 11px 16px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 500; white-space: nowrap; }
    td { padding: 13px 16px; font-size: 13.5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,0,0,0.015); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(45,106,79,0.1); color: var(--brand-mid); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-info .name { font-weight: 500; color: var(--text); font-size: 13.5px; }
    .user-info .email { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .company-cell { font-size: 13px; color: var(--muted2); }
    .role-pill { display: inline-flex; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; padding: 3px 9px; border-radius: 100px; font-weight: 500; }
    .role-broker { background: rgba(59,130,246,0.08); color: #1D4ED8; border: 1px solid rgba(59,130,246,0.2); }
    .role-iso { background: rgba(124,58,237,0.08); color: #6D28D9; border: 1px solid rgba(124,58,237,0.2); }
    .role-lender { background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold-bd); }
    .role-other { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 100px; }
    .s-pending { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
    .s-approved { background: var(--green-bg); color: var(--green-txt); border: 1px solid var(--green-bd); }
    .s-waitlist { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .s-denied { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-bd); }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .date-cell { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); white-space: nowrap; }
    .invites-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted2); }
    .actions-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .btn-approve { padding: 6px 13px; background: var(--brand); color: #fff; border: none; border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: background .18s, transform .1s; }
    .btn-approve:hover { background: var(--brand-mid); transform: translateY(-1px); }
    .btn-approve:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-waitlist { padding: 6px 11px; background: var(--bg); border: 1px solid var(--border-mid); border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; transition: all .18s; }
    .btn-waitlist:hover { background: var(--surface); color: var(--text); border-color: rgba(0,0,0,0.2); }
    .btn-waitlist:disabled { opacity: .4; cursor: not-allowed; }
    .credits-input { width: 52px; padding: 4px 7px; background: var(--bg); border: 1px solid var(--border-mid); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); outline: none; text-align: center; }
    .credits-input:focus { border-color: var(--brand-light); }
    .empty-row td { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 14px; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; background: var(--text); color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: opacity .22s, transform .22s; pointer-events: none; max-width: 340px; }
    .toast.show { opacity: 1; transform: none; }
    .toast.error { background: var(--red); }

    /* ── PANE VISIBILITY ── */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── LOADING STATE ── */
    .loading-row td { text-align: center; padding: 40px; }
    .mini-spinner { width: 22px; height: 22px; border: 2px solid rgba(0,0,0,0.08); border-top-color: var(--brand-mid); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) { .stats-row { grid-template-columns: 1fr 1fr; } th:nth-child(3), td:nth-child(3), th:nth-child(6), td:nth-child(6) { display: none; } }
    @media (max-width: 600px) { .main { padding: 20px 16px 60px; } th:nth-child(4), td:nth-child(4) { display: none; } }
  </style>
</head>

  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── AUTH CHECK ── */
    const { data:{ session } } = await supabase.auth.getSession();
    if (!session) { window.location.replace('/login.html'); throw new Error('no session — redirecting'); }
    const { data: me } = await supabase.from('profiles').select('is_admin').eq('id', session.user.id).single();
    if (!me?.is_admin) { window.location.replace('/index.html'); throw new Error('not admin — redirecting'); }

    /* ── STATE ── */
    let allUsers = [];

    /* ── TOAST ── */
    function toast(msg, isErr=false) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (isErr ? ' error' : '');
      setTimeout(() => { el.className = 'toast'; }, 3200);
    }

    /* ── HELPERS ── */
    function initials(name='') { return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?'; }
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }
    function rolePill(role) {
      const map = { broker:'role-broker Broker', iso:'role-iso ISO', lender:'role-lender Lender', other:'role-other Other' };
      const [cls, label] = (map[role] || 'role-other Other').split(' ');
      return `<span class="role-pill ${cls}">${label}</span>`;
    }
    function statusBadge(status) {
      const map = { pending:'s-pending Pending', approved:'s-approved Approved', waitlist:'s-waitlist Waitlist', denied:'s-denied Denied' };
      const [cls, label] = (map[status] || 's-waitlist Unknown').split(' ');
      return `<span class="status-badge ${cls}"><span class="status-dot"></span>${label}</span>`;
    }
    function exportCSV(rows, filename) {
      const headers = ['Name','Email','Company','Role','Status','Applied','Invites Sent','Invites Credits'];
      const lines = [headers.join(','), ...rows.map(r => [
        `"${r.full_name||''}"`, `"${r.email||''}"`, `"${r.company||''}"`,
        r.role||'', r.status||'', r.created_at ? new Date(r.created_at).toLocaleDateString() : '',
        r.invites_sent||0, r.invite_credits||5
      ].join(','))];
      const blob = new Blob([lines.join('\n')], { type:'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    }

    /* ── FETCH ── */
    async function loadUsers() {
      const { data, error } = await supabase
        .from('profiles')
        .select('id, email, full_name, company, role, status, created_at, invite_credits, invites_sent, is_admin, approved_at')
        .order('created_at', { ascending: false });
      if (error) { toast('Failed to load users: ' + error.message, true); return; }
      allUsers = data || [];
      updateStats();
      renderPending();
      renderAll();
      renderWaitlist();
      document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();
    }

    function updateStats() {
      const approved = allUsers.filter(u => u.status === 'approved').length;
      const pending  = allUsers.filter(u => u.status === 'pending').length;
      const waitlist = allUsers.filter(u => u.status === 'waitlist').length;
      const today    = allUsers.filter(u => {
        const d = new Date(u.created_at); const n = new Date();
        return d.toDateString() === n.toDateString();
      }).length;
      document.getElementById('statApproved').textContent = approved;
      document.getElementById('statPending').textContent  = pending;
      document.getElementById('statWaitlist').textContent = waitlist;
      document.getElementById('statToday').textContent    = today;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('allCount').textContent     = allUsers.length;
      document.getElementById('waitlistCount').textContent = waitlist;
    }

    /* ── ACTION BUTTONS ── */
    async function approveUser(userId, email, btn) {
      btn.disabled = true; btn.textContent = '...';
      const { error } = await supabase.from('profiles')
        .update({ status: 'approved', approved_at: new Date().toISOString() })
        .eq('id', userId);
      if (error) { toast('Error: ' + error.message, true); btn.disabled=false; btn.textContent='Approve'; return; }
      toast(`✓ Approved — email ${email} manually in Resend until Edge Function is deployed.`);
      await loadUsers();
    }

    async function waitlistUser(userId, btn) {
      btn.disabled = true; btn.textContent = '...';
      const { error } = await supabase.from('profiles').update({ status: 'waitlist' }).eq('id', userId);
      if (error) { toast('Error: ' + error.message, true); btn.disabled=false; btn.textContent='Waitlist'; return; }
      toast('Moved to waitlist.');
      await loadUsers();
    }

    async function updateCredits(userId, val) {
      const n = parseInt(val);
      if (isNaN(n) || n < 0 || n > 20) return;
      const { error } = await supabase.from('profiles').update({ invite_credits: n }).eq('id', userId);
      if (error) toast('Error updating credits: ' + error.message, true);
      else toast('Invite credits updated.');
    }

    /* ── RENDER PENDING ── */
    function renderPending() {
      const q   = document.getElementById('searchPending').value.toLowerCase();
      const rol = document.getElementById('rolePending').value;
      const rows = allUsers.filter(u => u.status === 'pending' && !u.is_admin)
        .filter(u => !q || [u.full_name,u.email,u.company].join(' ').toLowerCase().includes(q))
        .filter(u => !rol || u.role === rol);
      const tbody = document.getElementById('pendingBody');
      if (!rows.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No pending applications${q ? ' matching your search' : ''}.</td></tr>`; return; }
      tbody.innerHTML = rows.map(u => `
        <tr>
          <td><div class="user-cell"><div class="avatar">${initials(u.full_name)}</div><div class="user-info"><div class="name">${u.full_name||'—'}</div><div class="email">${u.email}</div></div></div></td>
          <td class="company-cell">${u.company||'—'}</td>
          <td>${rolePill(u.role)}</td>
          <td class="date-cell">${fmtDate(u.created_at)}</td>
          <td>${statusBadge(u.status)}</td>
          <td class="actions-cell">
            <button class="btn-approve" onclick="window._approve('${u.id}','${u.email}',this)">Approve</button>
            <button class="btn-waitlist" onclick="window._waitlist('${u.id}',this)">Waitlist</button>
          </td>
        </tr>`).join('');
    }

    /* ── RENDER ALL ── */
    function renderAll() {
      const q   = document.getElementById('searchAll').value.toLowerCase();
      const st  = document.getElementById('statusAll').value;
      const rol = document.getElementById('roleAll').value;
      const rows = allUsers.filter(u => !u.is_admin)
        .filter(u => !q || [u.full_name,u.email,u.company].join(' ').toLowerCase().includes(q))
        .filter(u => !st  || u.status === st)
        .filter(u => !rol || u.role === rol);
      const tbody = document.getElementById('allBody');
      if (!rows.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No users found.</td></tr>`; return; }
      tbody.innerHTML = rows.map(u => `
        <tr>
          <td><div class="user-cell"><div class="avatar">${initials(u.full_name)}</div><div class="user-info"><div class="name">${u.full_name||'—'}</div><div class="email">${u.email}</div></div></div></td>
          <td class="company-cell">${u.company||'—'}</td>
          <td>${rolePill(u.role)}</td>
          <td class="date-cell">${fmtDate(u.created_at)}</td>
          <td>${statusBadge(u.status)}</td>
          <td class="invites-cell"><input class="credits-input" type="number" min="0" max="20" value="${u.invite_credits??5}" onchange="window._credits('${u.id}',this.value)" title="Invite credits" /> / ${u.invites_sent??0} sent</td>
          <td class="actions-cell">
            ${u.status !== 'approved' ? `<button class="btn-approve" onclick="window._approve('${u.id}','${u.email}',this)">Approve</button>` : ''}
            ${u.status !== 'waitlist' ? `<button class="btn-waitlist" onclick="window._waitlist('${u.id}',this)">Waitlist</button>` : ''}
          </td>
        </tr>`).join('');
    }

    /* ── RENDER WAITLIST ── */
    function renderWaitlist() {
      const q = document.getElementById('searchWaitlist').value.toLowerCase();
      const rows = allUsers.filter(u => u.status === 'waitlist' && !u.is_admin)
        .filter(u => !q || [u.full_name,u.email,u.company].join(' ').toLowerCase().includes(q));
      const tbody = document.getElementById('waitlistBody');
      if (!rows.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Waitlist is empty.</td></tr>`; return; }
      tbody.innerHTML = rows.map(u => `
        <tr>
          <td><div class="user-cell"><div class="avatar">${initials(u.full_name)}</div><div class="user-info"><div class="name">${u.full_name||'—'}</div><div class="email">${u.email}</div></div></div></td>
          <td class="company-cell">${u.company||'—'}</td>
          <td>${rolePill(u.role)}</td>
          <td class="date-cell">${fmtDate(u.created_at)}</td>
          <td>${statusBadge(u.status)}</td>
          <td class="actions-cell">
            <button class="btn-approve" onclick="window._approve('${u.id}','${u.email}',this)">Approve</button>
          </td>
        </tr>`).join('');
    }

    /* ── GLOBAL HANDLERS (called from inline onclick) ── */
    window._approve  = (id, email, btn) => approveUser(id, email, btn);
    window._waitlist = (id, btn) => waitlistUser(id, btn);
    window._credits  = (id, val) => updateCredits(id, val);

    /* ── TABS ── */
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    /* ── SEARCH + FILTER ── */
    document.getElementById('searchPending').addEventListener('input', renderPending);
    document.getElementById('rolePending').addEventListener('change', renderPending);
    document.getElementById('searchAll').addEventListener('input', renderAll);
    document.getElementById('statusAll').addEventListener('change', renderAll);
    document.getElementById('roleAll').addEventListener('change', renderAll);
    document.getElementById('searchWaitlist').addEventListener('input', renderWaitlist);

    /* ── EXPORT ── */
    document.getElementById('exportPending').addEventListener('click', () => {
      exportCSV(allUsers.filter(u => u.status === 'pending'), 'lendpaper-pending.csv');
    });
    document.getElementById('exportAll').addEventListener('click', () => {
      exportCSV(allUsers, 'lendpaper-all-users.csv');
    });
    document.getElementById('exportWaitlist').addEventListener('click', () => {
      exportCSV(allUsers.filter(u => u.status === 'waitlist'), 'lendpaper-waitlist.csv');
    });

    /* ── REFRESH + SIGN OUT ── */
    document.getElementById('refreshBtn').addEventListener('click', loadUsers);
    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut(); window.location.href = '/login.html';
    });

    /* ── REALTIME ── */
    supabase.channel('admin-profiles')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, loadUsers)
      .subscribe();

    /* ── INIT ── */
    await loadUsers();
  </script>
</body>
</html>

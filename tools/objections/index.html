<html lang="en">
<head>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'%3E%3Crect width='24' height='24' rx='5' fill='%2314532D'/%3E%3Cpath d='M4 4v16h11l5-5V4H4z' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='square' stroke-linejoin='miter'/%3E%3Cpath d='M15 20v-5h5' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='square' stroke-linejoin='miter'/%3E%3Cpath d='M9 9v6' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='square' stroke-linejoin='miter'/%3E%3Cpath d='M9 15h4' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='square' stroke-linejoin='miter'/%3E%3C/svg%3E">
<style>
:root{
  --green:#14532D;--green-h:#0f4022;--green-s:rgba(20,83,45,.09);
  --ok:#16a34a;--bad:#dc2626;--amber:#ca8a04;--orange:#ea580c;
  --bg:#f8faf9;--surf:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --r:12px;--sh:0 2px 12px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

.topbar{background:var(--surf);border-bottom:1.5px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-brand{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--green);text-transform:uppercase;text-decoration:none;}
.topbar-brand span{color:#94a3b8;font-weight:400;}
.topbar-links{display:flex;gap:20px;}
.topbar-links a{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;}
.topbar-links a:hover{color:var(--text);}

.search-header{background:var(--surf);border-bottom:1.5px solid var(--border);padding:16px 20px 0;position:sticky;top:43px;z-index:40;}
.search-wrap{max-width:760px;margin:0 auto;}
.page-title{font-size:20px;font-weight:800;margin-bottom:12px;}
.search-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;}
.search-wrap-inner{position:relative;flex:1;}
.search-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;font-size:14px;outline:none;font-family:inherit;background:var(--bg);color:var(--text);transition:border .15s;}
.search-input:focus{border-color:var(--green);background:#fff;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:15px;}
.result-count{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}

.filter-chips{display:flex;gap:7px;flex-wrap:wrap;padding-bottom:14px;}
.chip{font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;background:var(--surf);color:var(--muted);transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--green);color:var(--green);}
.chip.active{background:var(--green);color:#fff;border-color:var(--green);}

.main{max-width:760px;margin:0 auto;padding:20px 20px 60px;}

.scenario{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:box-shadow .15s;}
.scenario:hover{box-shadow:var(--sh);}
.scenario.hidden{display:none;}

.sc-head{padding:16px 20px 14px;}
.sc-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sc-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--bg);border:1.5px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 7px;}
.sc-merchant{font-size:15px;font-style:italic;color:#0c4a6e;line-height:1.45;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px 10px 10px 3px;padding:12px 16px;}

.sc-response{padding:0 20px 16px;}
.response-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ok);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.response-text{font-size:14px;line-height:1.6;color:var(--text);font-weight:500;margin-bottom:6px;}
.response-note{font-size:12px;color:#15803d;line-height:1.55;}

.calc-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.calc-pill{font-size:11px;font-weight:600;color:var(--green);background:var(--green-s);border:1.5px solid rgba(20,83,45,.2);border-radius:20px;padding:4px 11px;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.calc-pill:hover{background:rgba(20,83,45,.16);border-color:var(--green);}

.others-toggle{margin-top:12px;padding-top:12px;border-top:1.5px solid var(--border);}
.others-btn{background:none;border:none;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;transition:color .15s;}
.others-btn:hover{color:var(--text);}
.others-btn .ch{transition:transform .18s;display:inline-block;}
.others-list{display:none;margin-top:10px;flex-direction:column;gap:7px;}
.others-list.open{display:flex;}
.other-row{border-radius:9px;padding:10px 13px;display:flex;gap:9px;align-items:flex-start;}
.or-ok    {background:rgba(202,138,4,.07);  border:1.5px solid rgba(202,138,4,.2);}
.or-wrong {background:rgba(234,88,12,.07);  border:1.5px solid rgba(234,88,12,.2);}
.or-killer{background:rgba(220,38,38,.07);  border:1.5px solid rgba(220,38,38,.2);}
.or-pill{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.op-ok    {background:#fef9c3;color:#854d0e;}
.op-wrong {background:#ffedd5;color:#c2410c;}
.op-killer{background:#fee2e2;color:#991b1b;}
.or-text{font-size:13px;color:var(--text);line-height:1.45;margin-bottom:3px;}
.or-note{font-size:11px;color:var(--muted);line-height:1.5;}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state strong{display:block;font-size:16px;color:var(--text);margin-bottom:6px;}

.footer-cta{background:var(--green-s);border:1.5px solid rgba(20,83,45,.18);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:12px;margin-top:8px;}
.footer-cta-icon{font-size:22px;flex-shrink:0;}
.fc-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:3px;}
.fc-text{font-size:12px;color:var(--muted);line-height:1.5;}
.fc-text a{color:var(--green);font-weight:600;text-decoration:none;}
.fc-text a:hover{text-decoration:underline;}

@media(max-width:520px){
  .topbar-links{display:none;}
  .search-header{padding:14px 14px 0;}
  .main{padding:16px 14px 48px;}
  .sc-head{padding:14px 14px 12px;}
  .sc-response{padding:0 14px 14px;}
  .sc-merchant{font-size:14px;}
  .response-text{font-size:13px;}
}
</style>
</head>
<body>

<nav class="topbar" id="topbar">
  <a class="topbar-brand" href="https://lendpaper.com">LendPaper <span>/ Tools</span></a>
  <div class="topbar-links">
    <a href="https://lendpaper.com">Home</a>
    <a href="https://lendpaper.com/glossary">Glossary</a>
    <a href="https://lendpaper.com/game">Quiz</a>
  </div>
</nav>

<div class="search-header">
  <div class="search-wrap">
    <div class="page-title">Closer's Playbook</div>
    <div class="search-row">
      <div class="search-wrap-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search" type="search" placeholder='Search — try "APR", "accountant", "credit score"…' autocomplete="off" spellcheck="false">
      </div>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="filter-chips" id="filter-chips"></div>
  </div>
</div>

<div class="main">
  <div id="scenario-list"></div>
  <div class="empty-state hidden" id="empty-state">
    <strong>No matches</strong>
    <span>Try a different keyword or clear the filter.</span>
  </div>
  <div class="footer-cta">
    <div class="footer-cta-icon">🎯</div>
    <div>
      <div class="fc-title">Want to practice under pressure?</div>
      <div class="fc-text">The scored quiz adds a timer, leaderboard, and 5 objection rounds — <a href="https://lendpaper.com/game">Deal Desk Quiz ↗</a></div>
    </div>
  </div>
</div>

<script>
const CALCS = {
  payment: {url:'https://lendpaper.com/tools/payment-breakdown', label:'Payment Breakdown', icon:'🔢'},
  dscr:    {url:'https://lendpaper.com/tools/dscr',              label:'DSCR Calculator',   icon:'📊'},
  fund:    {url:'https://lendpaper.com/tools/fundability',       label:'Fundability Check', icon:'✅'},
  water:   {url:'https://lendpaper.com/waterfall',               label:'Lender Waterfall',  icon:'🌊'},
};

const FILTERS = [
  {id:'all',     label:'All 35'},
  {id:'rate',    label:'Rate Conversation'},
  {id:'stalls',  label:'Stalls & Delays'},
  {id:'fear',    label:'Fear & Doubt'},
  {id:'qualify', label:'Qualification & Fit'},
  {id:'product', label:'How It Works'},
];

const TIER_META = {
  ok:     {label:'Acceptable',  pillClass:'op-ok',     rowClass:'or-ok'},
  wrong:  {label:'Wrong move',  pillClass:'op-wrong',  rowClass:'or-wrong'},
  killer: {label:'Deal killer', pillClass:'op-killer', rowClass:'or-killer'},
};

const OBJECTIONS = [
// ── Rate Conversation ────────────────────────────────────────────
{cat:'rate', badge:'Rate', calcs:['payment','dscr'],
 merchant:'Your factor rate is way too expensive.',
 opts:[
  {tier:'best',   text:"Let me show you what it looks like in daily dollars vs. your average deposits. Walk me through a typical month and we'll see if it actually registers.",   note:"Shifts from abstract cost to real daily impact. Gets the merchant talking instead of objecting."},
  {tier:'ok',     text:"Depending on your statements, there may be room to move on the rate.",                                                                                    note:"Keeps the door open but makes it a price negotiation rather than a value conversation."},
  {tier:'wrong',  text:"That rate is actually very competitive for your profile.",                                                                                                note:"Dismissive. Tells the merchant their concern is invalid — creates friction."},
  {tier:'killer', text:"Yeah, that's the best I've got.",                                                                                                                        note:"You surrendered before trying anything. Conversation over."},
]},
{cat:'rate', badge:'Rate', calcs:['payment'],
 merchant:"What's the APR? My accountant is going to ask.",
 opts:[
  {tier:'best',   text:"Great — this is a purchase of future receivables, not a loan, so traditional APR doesn't apply the same way. Total cost is [X]. What's your accountant's email? I'll put together a one-pager.",  note:"Validates the question, explains the structure correctly, and advances the deal by looping the accountant in proactively."},
  {tier:'ok',     text:"We can work up that calculation — it's structured differently than a loan.",                                                                              note:"Accurate but vague. Doesn't give the accountant anything concrete or advance the deal."},
  {tier:'wrong',  text:"APR doesn't really apply to this product.",                                                                                                              note:"Sounds evasive. The merchant and their accountant will both be suspicious."},
  {tier:'killer', text:"I honestly don't know the APR off the top of my head.",                                                                                                  note:"Kills credibility immediately. You either don't know your product or you're dodging — neither is good."},
]},
{cat:'rate', badge:'Rate', calcs:['payment'],
 merchant:"Another funder offered me 1.29. Can you match it?",
 opts:[
  {tier:'best',   text:"Let's compare apples to apples — who's the funder, what's the term, daily ACH or split? A 1.29 over 4 months is different than over 8. Send me the offer and I'll be straight with you.",         note:"Reframes rate as one variable among several. Positions you as a consultant, not a competitor in a price war."},
  {tier:'ok',     text:"Send me the offer and I'll see what I can do.",                                                                                                          note:"Reasonable, but you've accepted that price is the only variable that matters."},
  {tier:'wrong',  text:"We can't match that, but we have advantages in other areas.",                                                                                            note:"Concedes the loss too quickly without knowing what the other offer actually looks like."},
  {tier:'killer', text:"If they're at 1.29, you should probably just go with them.",                                                                                             note:"You just closed the deal for your competitor."},
]},
{cat:'rate', badge:'Rate', calcs:['fund','dscr'],
 merchant:"Why can't I just get a bank loan? It's way cheaper.",
 opts:[
  {tier:'best',   text:"You absolutely should if you qualify — let's figure that out right now. Banks want 2+ years TIB, 680+ FICO, and 3–6 months to close. If that's you, I'll point you there myself.",                 note:"Addresses the comparison head-on. Establishes credibility by being willing to lose the deal if the bank is genuinely the right move."},
  {tier:'ok',     text:"Bank loans are cheaper but take a lot longer — we can fund in 24–48 hours.",                                                                             note:"True but one-dimensional. Speed alone doesn't always justify the premium."},
  {tier:'wrong',  text:"Banks probably won't approve you.",                                                                                                                      note:"Presumptuous and insulting. If you're wrong, you just lost the merchant."},
  {tier:'killer', text:"That's just not realistic for most small businesses.",                                                                                                   note:"Dismissive. The merchant now feels talked down to."},
]},
{cat:'rate', badge:'Rate', calcs:['payment'],
 merchant:"What's the total payback on this deal?",
 opts:[
  {tier:'best',   text:"On this deal it's [X]. That cost buys you capital today that would take months elsewhere — if you could get it at all. What are you planning to use it for? Let's make sure the ROI is there.",    note:"Gives the number directly, then immediately reframes cost as investment. The ROI question moves the merchant forward."},
  {tier:'ok',     text:"Total payback is [X]. Let me pull that up for you right now.",                                                                                           note:"Accurate and transparent, but passive. You answered without advancing the close."},
  {tier:'wrong',  text:"It depends on how fast you repay it.",                                                                                                                   note:"True for some products, but sounds evasive — especially on a factor-rate deal where it's fixed."},
  {tier:'killer', text:"I'll have someone from the team send you a formal breakdown.",                                                                                            note:"Added a step, introduced delay, removed yourself from the relationship. Momentum killer."},
]},
{cat:'rate', badge:'Rate', calcs:['payment','dscr'],
 merchant:"The daily payment is going to kill my cash flow.",
 opts:[
  {tier:'best',   text:"That's the most important thing to get right. Tell me your average daily deposits and we'll build the advance around a number you won't feel. Most merchants forget it's coming out within a week.", note:"Validates the concern, then gets the merchant to help solve it. Keeps you in control of the structure."},
  {tier:'ok',     text:"We can look at a smaller advance to bring the daily down.",                                                                                              note:"Practical, but reactive. You're letting the objection dictate the structure."},
  {tier:'wrong',  text:"The payment adjusts automatically with your revenue.",                                                                                                   note:"May not be accurate depending on the product. If it's fixed ACH, you've just misstated the terms."},
  {tier:'killer', text:"That's a fixed payment — it's how the product is structured.",                                                                                           note:"Confirms their worst fear without offering any solution. Deal is dead."},
]},
{cat:'rate', badge:'Rate', calcs:['payment'],
 merchant:"I've heard MCAs charge 80–90% APR. That sounds criminal.",
 opts:[
  {tier:'best',   text:"When you convert any short-term product to APR it looks alarming — that math works on a 30-day loan too. The real question is: does the capital return more than it costs? Let's run that math.",  note:"Doesn't argue the rate — acknowledges it, reframes how to evaluate it. The ROI pivot is the standard close for cost objections."},
  {tier:'ok',     text:"APR isn't really the right lens for this product since it's not a traditional loan.",                                                                    note:"Technically correct but sounds defensive. You need to offer an alternative framework, not just discredit theirs."},
  {tier:'wrong',  text:"Our rates are very competitive for the market.",                                                                                                         note:"Doesn't address the concern at all. 'Competitive' next to '80–90% APR' is not reassuring."},
  {tier:'killer', text:"That's just how alternative finance works. Banks aren't an option for most businesses.",                                                                  note:"Dismissive and slightly threatening. This ends the conversation and the relationship."},
]},
// ── Stalls & Delays ──────────────────────────────────────────────
{cat:'stalls', badge:'Stall', calcs:[],
 merchant:"I need to think about it.",
 opts:[
  {tier:'best',   text:"Of course — what specifically do you need to think through? I want to make sure you have the right information before you decide, not after.",                                                      note:"Never accept a 'think about it' at face value. This response surfaces the real objection hiding behind it — professionally, not pushily."},
  {tier:'ok',     text:"Totally understand. I'll follow up tomorrow — when's a good time?",                                                                                     note:"Polite but you've lost control of the timeline. You're now at the mercy of their calendar."},
  {tier:'wrong',  text:"Take your time — the offer's good for 30 days.",                                                                                                        note:"You've just told them there's no urgency. Offers don't stay open 30 days in this industry."},
  {tier:'killer', text:"Ok — call me when you're ready.",                                                                                                                        note:"You fully surrendered the close. This deal is gone."},
]},
{cat:'stalls', badge:'Stall', calcs:[],
 merchant:"I need to run this by my business partner first.",
 opts:[
  {tier:'best',   text:"Absolutely — can we get them on a quick call right now? I find it's always faster to answer questions in real time than to play telephone. When are they usually free?",                           note:"Bringing the partner into the call is the gold standard. It removes a round-trip delay and lets you handle their questions directly."},
  {tier:'ok',     text:"I can send over a one-pager that you both can review together.",                                                                                         note:"Reasonable, but you've introduced another step and lost direct access to the decision-maker."},
  {tier:'wrong',  text:"Sure — just let me know what they say.",                                                                                                                 note:"You've handed the deal to someone you've never met. The partner will ask questions the merchant can't answer."},
  {tier:'killer', text:"Tell them to reach out if they have any questions.",                                                                                                     note:"You're now three steps removed from the close. Almost no deal survives this path."},
]},
{cat:'stalls', badge:'Stall', calcs:['dscr'],
 merchant:"My accountant told me not to do this.",
 opts:[
  {tier:'best',   text:"I'd love to get on a call with them — not to sell them, but because they're probably looking at this as a loan on the P&L. Can we loop them in? I can walk them through the structure in 10 minutes.", note:"The accountant objection is almost always solvable if you treat it as an education opportunity. Inviting them in is always the right move."},
  {tier:'ok',     text:"I can send documentation that shows the full structure for them to review.",                                                                              note:"Better than doing nothing, but it puts the accountant in a position to find reasons to say no without anyone to answer their questions."},
  {tier:'wrong',  text:"Accountants sometimes don't fully understand how these products work.",                                                                                  note:"You're insulting their trusted advisor. Even if it's partially true, saying it ends the relationship."},
  {tier:'killer', text:"They're being overly cautious — this product is extremely common.",                                                                                      note:"You just called their accountant paranoid. Conversation over."},
]},
{cat:'stalls', badge:'Stall', calcs:['dscr'],
 merchant:"The timing just isn't right. Call me in 3 months.",
 opts:[
  {tier:'best',   text:"Tell me what changes in 3 months. I want to understand what you're waiting for — sometimes the best time to fund is right before the peak, not after.",                                            note:"You need to know whether '3 months' means something real or is a polite dismissal. This question separates the two without being aggressive."},
  {tier:'ok',     text:"I'll put a note in and reach out then. What's driving the timing?",                                                                                     note:"At least you asked the right follow-up — but you've surrendered the close for 90 days."},
  {tier:'wrong',  text:"The offer expires, so we'd have to rerun your file in 3 months.",                                                                                       note:"True and worth mentioning, but leading with it sounds like a threat rather than helpful information."},
  {tier:'killer', text:"Ok, I'll call you in 3 months.",                                                                                                                        note:"Deals die in 3 months. This one will too."},
]},
{cat:'stalls', badge:'Stall', calcs:['payment'],
 merchant:"I'm waiting on a big invoice. I won't need capital once it comes in.",
 opts:[
  {tier:'best',   text:"When's that invoice due? In my experience they always slip — and if it does, you don't want to be scrambling. And if it comes in on time, you can pay this off early for a discount. You're covered either way.", note:"The 'it always slips' reframe is realistic, not fear-mongering. The early payoff pivot turns the invoice into a reason to fund now, not wait."},
  {tier:'ok',     text:"Would bridge capital help cover the gap while you wait?",                                                                                                note:"Smart redirect, but you're solving a different problem than what was presented."},
  {tier:'wrong',  text:"Ok — call me when you know more about the invoice.",                                                                                                    note:"You just handed your entire pipeline to a receivable you have no control over."},
  {tier:'killer', text:"If you're getting a big payment you definitely don't need us.",                                                                                          note:"You just closed the deal against yourself."},
]},
{cat:'stalls', badge:'Stall', calcs:[],
 merchant:"I'm too busy right now. I can't deal with paperwork.",
 opts:[
  {tier:'best',   text:"That's exactly when my merchants usually call me — when the business is outpacing the capital. I can have you funded in 24 hours with 15 minutes of your time. What does tomorrow morning look like?", note:"Reframes 'too busy' as a signal the business is doing well. The 15-minute and specific time ask breaks the pattern."},
  {tier:'ok',     text:"I handle everything on my end — all I need is a signature.",                                                                                             note:"Reduces friction, but doesn't create urgency or address why they're putting it off."},
  {tier:'wrong',  text:"I understand — I'll try you again next week.",                                                                                                          note:"You've just given the deal a week to die."},
  {tier:'killer', text:"Let me know when things slow down.",                                                                                                                     note:"Things never slow down. This is a soft goodbye."},
]},
{cat:'stalls', badge:'Stall', calcs:[],
 merchant:"Just send me an email with all the details.",
 opts:[
  {tier:'best',   text:"Sending it now — but quick question first: what's the one thing that would make this a yes? That way I know what to highlight instead of flooding your inbox.",                                    note:"Complies AND surfaces the hidden objection. One of the most useful tactics in the space."},
  {tier:'ok',     text:"I'll send it over — what's the best email and should I copy anyone else?",                                                                              note:"Organized and compliant. Misses the chance to surface the real concern but at least keeps momentum."},
  {tier:'wrong',  text:"Sure — I'll send everything over. Let me know if you have any questions.",                                                                               note:"Generic and passive. You're now waiting with no follow-up commitment."},
  {tier:'killer', text:"Sure. Feel free to reach back out whenever you've had a chance to look.",                                                                                note:"You just put the next step entirely in their hands. This deal has a 10% chance of closing."},
]},
// ── Fear & Doubt ─────────────────────────────────────────────────
{cat:'fear', badge:'Fear', calcs:[],
 merchant:"I've heard MCAs target desperate businesses. It feels predatory.",
 opts:[
  {tier:'best',   text:"That reputation exists and some players have earned it. I can only control how I show up — and if this deal doesn't make sense for your business, I'll tell you that directly. Let's look at your numbers together and you decide.", note:"The most credible answer is the honest one. Acknowledging the reputation without being defensive builds more trust than denying it."},
  {tier:'ok',     text:"There are bad actors in every industry. We operate transparently — you'll know the full cost upfront.",                                                  note:"Reasonable but defensive. You're drawing a line between 'us' and 'them' without really earning that distinction yet."},
  {tier:'wrong',  text:"That's a misconception — MCAs are legitimate financial products used by thousands of businesses.",                                                       note:"Sounds like PR speak. The merchant's guard will go up, not down."},
  {tier:'killer', text:"I understand your concern. Call me if you change your mind.",                                                                                            note:"You accepted the objection without countering it. Deal over."},
]},
{cat:'fear', badge:'Fear', calcs:['dscr','payment'],
 merchant:"What happens if revenue drops and I can't make the daily payment?",
 opts:[
  {tier:'best',   text:"That's the right question. If this is RBF, the daily pull is tied to your revenue — slow month, smaller payment. If it's ACH, let's right-size the advance so a slow month doesn't feel like a stretch. What does a bad month look like for you?", note:"Explains the product mechanics correctly, then immediately moves to right-sizing. The 'bad month' question pulls the merchant into solution mode."},
  {tier:'ok',     text:"We can size the advance smaller so payments are more manageable in slow months.",                                                                        note:"Practical but doesn't address the underlying concern about what actually happens if they genuinely can't pay."},
  {tier:'wrong',  text:"Default is serious — you'd really want to avoid that. Let's make sure you can handle the payment.",                                                     note:"You introduced the word 'default' unprompted. That's a fear anchor you don't want to plant."},
  {tier:'killer', text:"If you can't pay, the funder would begin collections.",                                                                                                  note:"Technically accurate, maximally terrifying. This closes zero deals."},

let activeFilter = 'all';
let searchQ = '';

function buildChips() {
  const el = document.getElementById('filter-chips');
  FILTERS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (f.id === 'all' ? ' active' : '');
    btn.textContent = f.label;
    btn.dataset.id = f.id;
    btn.onclick = () => setFilter(f.id);
    el.appendChild(btn);
  });
}

function setFilter(id) {
  activeFilter = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  applyFilters();
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  applyFilters();
});

function applyFilters() {
  let visible = 0;
  document.querySelectorAll('.scenario').forEach((el, i) => {
    const obj = OBJECTIONS[i];
    const catMatch = activeFilter === 'all' || obj.cat === activeFilter;
    const searchMatch = !searchQ ||
      obj.merchant.toLowerCase().includes(searchQ) ||
      obj.opts.find(o => o.tier === 'best').text.toLowerCase().includes(searchQ) ||
      obj.cat.includes(searchQ) || obj.badge.toLowerCase().includes(searchQ);
    const show = catMatch && searchMatch;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  const total = OBJECTIONS.length;
  document.getElementById('result-count').textContent =
    visible === total ? `${total} scenarios` : `${visible} of ${total}`;
  document.getElementById('empty-state').classList.toggle('hidden', visible > 0);
}

function toggleOthers(btn, listId) {
  const list = document.getElementById(listId);
  const open = list.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.querySelector('.ch').textContent = open ? '↑' : '↓';
  btn.childNodes[0].textContent = open ? 'Hide other responses ' : 'Other responses ';
}

function renderAll() {
  const container = document.getElementById('scenario-list');
  OBJECTIONS.forEach((obj, i) => {
    const best = obj.opts.find(o => o.tier === 'best');
    const others = obj.opts.filter(o => o.tier !== 'best');
    const listId = `others-${i}`;

    const calcHTML = (obj.calcs && obj.calcs.length)
      ? `<div class="calc-row">${obj.calcs.map(k => {
          const c = CALCS[k];
          return `<a class="calc-pill" href="${c.url}" target="_blank" rel="noopener">${c.icon} ${c.label} ↗</a>`;
        }).join('')}</div>`
      : '';

    const othersHTML = others.map(o => {
      const m = TIER_META[o.tier];
      return `<div class="other-row ${m.rowClass}">
        <span class="or-pill ${m.pillClass}">${m.label}</span>
        <div><div class="or-text">${o.text}</div><div class="or-note">${o.note}</div></div>
      </div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'scenario';
    card.innerHTML = `
      <div class="sc-head">
        <div class="sc-meta"><span class="sc-badge">${obj.badge}</span></div>
        <div class="sc-merchant">${obj.merchant}</div>
      </div>
      <div class="sc-response">
        <div class="response-label">🟢 Best move</div>
        <div class="response-text">${best.text}</div>
        <div class="response-note">${best.note}</div>
        ${calcHTML}
        <div class="others-toggle">
          <button class="others-btn" onclick="toggleOthers(this,'${listId}')">
            Other responses <span class="ch">↓</span>
          </button>
          <div class="others-list" id="${listId}">${othersHTML}</div>
        </div>
      </div>`;
    container.appendChild(card);
  });
  applyFilters();
}

buildChips();
renderAll();

if (window.self !== window.top) {
  document.getElementById('topbar').style.display = 'none';
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Breakdown | LendPaper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../public/assets/brand/favicon.svg">
    <link rel="apple-touch-icon" href="../public/assets/brand/apple-touch-icon-180x180.png">
    <link rel="stylesheet" href="../public/assets/css/calculator-shell.css">
    <script src="../public/assets/js/calculator-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Typography & Core Variables */
        :root {
            --brand-primary: #111827;
            --brand-secondary: #6B7280;
            --brand-accent: #14532D;
            --brand-accent-hover: #065F46;
            --brand-tint: #F0FDF4;
            --brand-border: #E5E7EB;
            --brand-warning: #F59E0B;
            --brand-error: #EF4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F3F4F6;
            color: var(--brand-primary);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Tooltip Component Standard */
        .tooltip { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .tooltip .tooltiptext {
            visibility: hidden; 
            background-color: #FFFFFF; 
            color: var(--brand-primary);
            text-align: left; 
            border: 1px solid var(--brand-border);
            border-radius: 6px; 
            padding: 8px; 
            position: absolute;
            z-index: 9999; 
            bottom: 125%; 
            opacity: 0; 
            transition: opacity 0.2s;
            font-size: 12px; 
            font-weight: normal; 
            line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            text-transform: none; 
            letter-spacing: normal;
            max-width: 220px;
            width: max-content;
        }
        .tooltip-left-anchor .tooltiptext { left: 0; transform: translateX(-20%); }
        .tooltip-right-anchor .tooltiptext { right: 0; transform: translateX(20%); }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        /* Input Overrides */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }
        
        input[type=checkbox] {
            accent-color: var(--brand-accent);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .lp-input-group {
            display: flex;
            align-items: center;
            border: 2px solid var(--brand-border);
            border-radius: 8px;
            background-color: #FFFFFF;
            transition: border-color 0.15s ease;
        }
        .lp-input-group:focus-within {
            border-color: var(--brand-accent);
        }
        .lp-input-group.has-error {
            border-color: var(--brand-error);
        }
        .lp-input-group.has-warning {
            border-color: var(--brand-warning);
        }
        .lp-input {
            width: 100%;
            padding: 10px 12px;
            outline: none;
            color: var(--brand-primary);
            font-size: 15px;
            font-weight: 600;
            background: transparent;
        }

        /* Layout specific */
        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--brand-primary);
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 8px;
        }
        label.flex { display: flex; }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            padding: 24px;
        }
        @media (max-width: 640px) {
            main { padding: 16px 12px; }
            .lp-howto { padding: 16px; margin-bottom: 24px; }
        }
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: center;
            width: 100%;
        }
        
        .lp-howto {
            background-color: #F0FDF4;
            border-radius: 12px;
            color: #334155;
            font-size: 13.5px;
            font-weight: 500;
            line-height: 1.6;
            padding: 20px;
            margin-bottom: 32px;
        }
        .lp-howto strong { color: #14532D; font-weight: 800; }

        .takeaway {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #14532D;
            border-radius: 12px;
            padding: 16px 18px;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.6;
            margin-top: 24px;
        }
        .takeaway-eyebrow {
            display: block;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 6px;
        }

        /* Results Column */
        .results-col {
            background-color: #F9FAFB;
            border-left: 1px solid var(--brand-border);
        }

        /* Pill Button Style */
        .lp-pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border: 2px dashed var(--brand-border);
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--brand-secondary);
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            font-family: inherit;
        }
        .lp-pill-btn:hover {
            border-color: var(--brand-accent);
            color: var(--brand-accent);
        }

        /* Amortization Table Scroll with Fade */
        .table-scroll-container {
            max-height: 280px;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--brand-border);
            border-radius: 8px;
        }
        .table-scroll-container::-webkit-scrollbar { width: 6px; }
        .table-scroll-container::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }

        /* Action Buttons Standard */
        .lp-copy-btn {
            background-color: var(--brand-accent);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .lp-copy-btn:hover { background-color: #0f4022; }

        .lp-print-btn {
            background-color: transparent;
            color: var(--brand-accent);
            padding: 16px;
            border: 2px solid var(--brand-accent);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .lp-print-btn:hover { background-color: var(--brand-tint); }

        /* Embedded state adjustments */
        body.is-embedded { background-color: transparent; }
        body.is-embedded main { padding: 0; align-items: center; justify-content: center; }
        body.is-embedded header, body.is-embedded .modal-header { display: none !important; }
        body.is-embedded .modal-shell { box-shadow: none; border: none; border-radius: 0; }
        body.is-embedded .remove-card-btn { display: none !important; }

        @media (max-width: 768px) {
            .results-col { border-left: none; border-top: 1px solid var(--brand-border); }
        }

        /* Print Export Standards */
        .print-header-content { display: none; }
        .print-footer-legal, .print-watermark { display: none; }

        @media print {
            body { background: white !important; }
            .no-print, header, .action-buttons, .tooltiptext, .lp-howto, .remove-card-btn { display: none !important; }
            .print-header-content { display: block !important; text-align: center; margin-bottom: 32px; padding-top: 20px; }
            .print-header-content img { height: 32px; margin: 0 auto 12px auto; }
            .print-header-content h1 { font-size: 22px; font-weight: 800; color: var(--brand-primary); margin: 0; text-transform: uppercase; }
            .modal-shell { box-shadow: none !important; border: none !important; max-width: 100% !important; margin: 0 auto !important; }
            .print-footer-legal { display: block !important; margin-top: 40px !important; padding-top: 20px !important; border-top: 1px solid #e5e7eb !important; font-size: 10px !important; color: #94a3b8 !important; text-align: center !important; text-transform: uppercase !important; line-height: 1.5 !important; }
            .print-watermark { display: block !important; font-size: 10px !important; color: #94a3b8 !important; text-align: center !important; margin-top: 12px !important; }
        }

        /* Direct PDF Export Styles */
        body.pdf-export-mode { background: white !important; }
        body.pdf-export-mode .no-print, 
        body.pdf-export-mode header, 
        body.pdf-export-mode .action-buttons, 
        body.pdf-export-mode .tooltiptext, 
        body.pdf-export-mode .lp-howto, 
        body.pdf-export-mode .remove-card-btn { display: none !important; }
        body.pdf-export-mode .print-header-content { display: block !important; text-align: center; margin-bottom: 32px; padding-top: 20px; }
        body.pdf-export-mode .print-header-content img { height: 32px; margin: 0 auto 12px auto; }
        body.pdf-export-mode .print-header-content h1 { display: none !important; }

        body.pdf-export-mode main { padding: 0 !important; display: block !important; max-width: 1000px !important; margin: 0 auto !important; }
        body.pdf-export-mode .modal-shell { box-shadow: none !important; border: none !important; max-width: 100% !important; margin: 0 auto !important; break-inside: avoid; }
        body.pdf-export-mode .print-footer-legal { display: block !important; margin-top: 40px !important; padding-top: 20px !important; border-top: 1px solid #e5e7eb !important; font-size: 10px !important; color: #94a3b8 !important; text-align: center !important; text-transform: uppercase !important; line-height: 1.5 !important; }
        body.pdf-export-mode .print-watermark { display: block !important; font-size: 10px !important; color: #94a3b8 !important; text-align: center !important; margin-top: 12px !important; }
    </style>
</head>
<body>

    <!-- Main Workspace -->
    <main class="w-full relative">
        <div class="print-header-content">
            <img src="../public/assets/brand/logo-lockup-light.svg" alt="LendPaper Logo">
            <h1>Payment Breakdown Report</h1>
        </div>

        <div class="flex justify-center mb-8 no-print">
            <button onclick="addCard()" class="lp-pill-btn h-[40px] px-6">+ Compare Scenarios</button>
        </div>
        
        <div id="cardsContainer" class="cards-container">
            <!-- Cards injected here via JS -->
        </div>
    </main>

    <!-- Global Layout Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#111827] text-white px-4 py-2 rounded-md shadow-lg text-[13px] opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        Copied!
    </div>

    <!-- Print Baseline Constants -->
    <div class="print-footer-legal">
        THESE FIGURES ARE ESTIMATES FOR INFORMATIONAL PURPOSES ONLY. ACTUAL LOAN TERMS, RATES, AND FEES WILL BE DETERMINED BY THE LENDER UPON FINAL REVIEW.
    </div>
    <div class="print-watermark">
        Powered by LendPaper | info@lendpaper.com | lendpaper.com — Custom brand | bespoke tooling available
    </div>

    <script>
        const WATERMARK_FOOTER = "Powered by LendPaper | info@lendpaper.com | lendpaper.com — Custom brand | bespoke tooling available";
        
        async function handleLendPaperSavePDF() {
            const btn = event.currentTarget;
            const origText = btn.innerHTML;
            btn.innerHTML = "Generating...";
            btn.disabled = true;

            document.body.classList.add('pdf-export-mode');
            
            const element = document.querySelector('main');
            const opt = {
                margin: [10, 10],
                filename: `LendPaper_Amortization_estimate_${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, logging: false, useCORS: true },
                jsPDF: { unit: 'mm', format: 'letter', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
            } finally {
                document.body.classList.remove('pdf-export-mode');
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        }
        
        const holidays = [
            "2024-01-01", "2024-01-15", "2024-02-19", "2024-05-27", "2024-06-19", "2024-07-04", "2024-09-02", "2024-10-14", "2024-11-11", "2024-11-28", "2024-12-25",
            "2025-01-01", "2025-01-20", "2025-02-17", "2025-05-26", "2025-06-19", "2025-07-04", "2025-09-01", "2025-10-13", "2025-11-11", "2025-11-27", "2025-12-25"
        ];

        function isBusinessDay(date, skipHolidays) {
            const day = date.getDay();
            if(day === 0 || day === 6) return false;
            if(skipHolidays) {
                const dateStr = date.toISOString().split('T')[0];
                if(holidays.includes(dateStr)) return false;
            }
            return true;
        }

        function addDaysCalendarRolling(startDate, days, skipHolidays) {
            let next = new Date(startDate);
            next.setDate(next.getDate() + days);
            while(!isBusinessDay(next, skipHolidays)) {
                next.setDate(next.getDate() + 1);
            }
            return next;
        }

        function addMonthsCalendarRolling(startDate, months, skipHolidays) {
            let next = new Date(startDate);
            const targetDay = next.getDate();
            next.setMonth(next.getMonth() + months);
            if (next.getDate() !== targetDay) next.setDate(0);
            while(!isBusinessDay(next, skipHolidays)) next.setDate(next.getDate() + 1);
            return next;
        }

        function getNextBusinessDay(startDate, skipHolidays) {
            let next = new Date(startDate);
            next.setDate(next.getDate() + 1);
            while(!isBusinessDay(next, skipHolidays)) next.setDate(next.getDate() + 1);
            return next;
        }

        function parseLocalDate(yyyyMmDd) {
            if (!yyyyMmDd) return new Date();
            const [y, m, d] = yyyyMmDd.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function getPeriodRate(pv, pmt, n) {
            let low = 0, high = 1;
            for(let i=0; i<50; i++) {
                let mid = (low + high) / 2;
                let calcPv = pmt * (1 - Math.pow(1 + mid, -n)) / mid;
                if(calcPv > pv) low = mid; else high = mid;
            }
            return (low + high) / 2;
        }

        const fmtUsd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

        function cleanNumericInput(val) {
            const num = parseFloat(val);
            return isNaN(num) ? null : num;
        }

        function togglePrepay(id) {
            const isChecked = document.getElementById(`enablePrepay-${id}`).checked;
            const section = document.getElementById(`prepaySection-${id}`);
            const summary = document.getElementById(`prepaySummary-${id}`);
            isChecked ? section.classList.remove('hidden') : section.classList.add('hidden');
            isChecked ? summary.classList.remove('hidden') : summary.classList.add('hidden');
        }

        function updateHeaders() {
            const cards = document.querySelectorAll('.modal-shell');
            const totalCount = cards.length;

            cards.forEach((card, index) => {
                const id = card.id.split('-')[1];
                const headerCenter = document.getElementById(`header-center-${id}`);
                const scenarioLetter = String.fromCharCode(64 + (index + 1));

                headerCenter.innerHTML = `
                    <h1 class="text-[15px] font-extrabold text-[#111827] uppercase tracking-wider">Payment Breakdown</h1>
                    <div class="text-[10px] uppercase tracking-[0.1em] text-[#6B7280] font-bold mt-0.5">Scenario Modeling Engine</div>
                `;
                
                if (totalCount > 1) {
                    const badge = document.getElementById(`badge-container-${id}`);
                    badge.innerHTML = `<span class="px-[8px] py-[3px] text-[10px] font-extrabold uppercase bg-[#F0FDF4] text-[#14532D] rounded-[4px] tracking-[0.05em] border border-[#BBF7D0]">SCENARIO ${scenarioLetter}</span>`;
                    badge.classList.remove('hidden');
                }
                calcCard(id);
            });
        }

        let maxId = 0;

        function addCard() {
            maxId++;
            const id = maxId;
            const today = new Date().toISOString().split('T')[0];

            const cardHTML = `
            <div class="modal-shell w-full max-w-[1000px] bg-white rounded-[20px] shadow-sm border border-[#E5E7EB] overflow-hidden flex flex-col relative no-break-inside" id="cardContainer-${id}">
                
                <div class="h-[64px] px-[24px] flex items-center justify-between border-b border-[#E5E7EB] bg-white shrink-0 relative">
                    <div id="badge-container-${id}" class="z-10"></div>
                    <div class="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none" id="header-center-${id}"></div>
                    <div class="flex items-center z-10">
                        <button onclick="removeCard(${id})" class="remove-card-btn w-[32px] h-[32px] rounded-full hover:bg-slate-50 flex items-center justify-center text-[#6B7280] text-[20px] leading-none no-print transition-colors hover:text-[#EF4444]">&times;</button>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row">
                    <div class="w-full md:w-[50%] p-[20px] sm:p-[32px] flex flex-col relative">
                        <div class="lp-howto">
                            Enter the loan amount, rate, and term. You'll see the exact <strong>payment schedule</strong> — and what to tell your borrower about total cost and prepayment savings.
                        </div>

                        <div id="badge-container-${id}" class="hidden mb-4"></div>

                        <div class="grid grid-cols-2 gap-x-4 gap-y-5">
                            <div class="col-span-2">
                                <label>Loan Amount</label>
                                <div class="lp-input-group">
                                    <span class="pl-3 pr-2 text-[#94A3B8] font-bold border-r border-[#E5E7EB]">$</span>
                                    <input type="number" id="amt-${id}" value="100000" min="0" class="lp-input" oninput="calcCard(${id})">
                                </div>
                            </div>

                            <div>
                                <label class="flex items-center">
                                    Cost per Dollar Borrowed
                                    <span class="tooltip ml-1 no-print">
                                        <span class="w-[14px] h-[14px] inline-flex items-center justify-center rounded-full border border-[#6B7280] text-[#6B7280] text-[9px] font-bold italic transition-colors bg-white">i</span>
                                        <span class="tooltiptext">How many cents you pay per dollar funded. e.g. 25¢ means $1.25 repaid per $1 borrowed.</span>
                                    </span>
                                </label>
                                <div class="lp-input-group">
                                    <input type="number" step="0.01" id="factor-${id}" value="${id===1 ? 1.25 : 1.30}" min="0" class="lp-input" oninput="calcCard(${id})">
                                </div>
                            </div>

                            <div>
                                <label>Term</label>
                                <div class="lp-input-group">
                                    <input type="number" id="term-${id}" value="${id===1 ? 12 : 18}" min="0" class="lp-input text-right" oninput="calcCard(${id})">
                                    <span class="pr-3 pl-2 text-[#94A3B8] font-bold border-l border-[#E5E7EB]">mos</span>
                                </div>
                            </div>

                            <div class="col-span-2">
                                <label>Origination Fee</label>
                                <div class="lp-input-group">
                                    <input type="number" step="0.1" id="fee-${id}" value="3.0" min="0" class="lp-input" oninput="calcCard(${id})">
                                    <span class="pr-3 pl-2 text-[#94A3B8] font-bold border-l border-[#E5E7EB]">%</span>
                                </div>
                            </div>

                            <div class="col-span-2">
                                <label>Payment Frequency</label>
                                <div class="lp-input-group pr-2">
                                    <select id="freq-${id}" class="w-full py-2.5 px-3 outline-none text-[#111827] text-[14px] font-semibold bg-transparent appearance-none cursor-pointer" onchange="calcCard(${id})">
                                        <option value="daily">Daily</option>
                                        <option value="weekly" selected>Weekly</option>
                                        <option value="semimonthly">Semi-Mo</option>
                                        <option value="monthly">Monthly</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 pt-6 border-t border-[#E5E7EB]">
                            <div class="mb-4">
                                <label>Start Date</label>
                                <div class="lp-input-group">
                                    <input type="date" id="start-${id}" value="${today}" class="lp-input font-bold" onchange="calcCard(${id})">
                                </div>
                            </div>

                            <label class="flex items-center cursor-pointer group mb-1 w-max select-none">
                                <input type="checkbox" id="enablePrepay-${id}" class="rounded border-[#E5E7EB] focus:ring-[#14532D]" onchange="togglePrepay(${id}); calcCard(${id})">
                                <span class="ml-2 text-[12px] uppercase tracking-[0.05em] text-[#14532D] font-extrabold">Model Prepay Savings</span>
                            </label>
                            <div class="text-[11px] text-[#6B7280] mb-4">Model early payoff savings and reduced interest cost.</div>
                            
                            <div id="prepaySection-${id}" class="hidden grid grid-cols-2 gap-4 bg-[#F8FAFC] p-4 rounded-xl border border-[#E2E8F0]">
                                <div>
                                    <label class="!text-[#6B7280]">Target Paid Down</label>
                                    <div class="lp-input-group">
                                        <input type="number" id="renPct-${id}" value="50" min="0" class="lp-input text-right" oninput="calcCard(${id})">
                                        <span class="pr-3 pl-2 text-[#94A3B8] font-bold">%</span>
                                    </div>
                                </div>
                                <div>
                                    <label class="!text-[#6B7280]">Pre-Pay Discount</label>
                                    <div class="lp-input-group">
                                        <input type="number" id="discPct-${id}" value="25" min="0" class="lp-input text-right" oninput="calcCard(${id})">
                                        <span class="pr-3 pl-2 text-[#94A3B8] font-bold">%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="w-full md:w-[50%] p-[20px] sm:p-[32px] flex flex-col results-col">
                        <div>
                            <div class="mb-6 pb-6 border-b border-[#E5E7EB]">
                                <div class="text-[11px] text-[#64748B] font-bold uppercase tracking-wider mb-2" id="lblPmt-${id}">Est. payment</div>
                                <div class="text-[42px] font-black text-[#14532D] leading-none tracking-tight" id="valPmt-${id}">$0.00</div>
                            </div>

                            <div class="grid grid-cols-2 gap-y-6 gap-x-8 text-[13px] mb-8">
                                <div>
                                    <div class="text-[#64748B] font-bold uppercase text-[10px] tracking-wider mb-1">Total payback</div>
                                    <div class="font-extrabold text-[#111827] text-[16px]" id="outPayback-${id}">$0.00</div>
                                </div>
                                <div>
                                    <div class="text-[#64748B] font-bold uppercase text-[10px] tracking-wider mb-1">Total interest</div>
                                    <div class="font-extrabold text-[#111827] text-[16px]" id="outInterest-${id}">$0.00</div>
                                </div>
                                <div>
                                    <div class="text-[#64748B] font-bold uppercase text-[10px] tracking-wider mb-1">Cost per Dollar</div>
                                    <div class="font-extrabold text-[#111827] text-[16px]" id="outCents-${id}">0¢</div>
                                </div>
                                <div>
                                    <div class="text-[#64748B] font-bold uppercase text-[10px] tracking-wider mb-1">APR</div>
                                    <div class="font-extrabold text-[#111827] text-[16px]" id="outApr-${id}">0%</div>
                                </div>
                            </div>

                            <div id="prepaySummary-${id}" class="hidden bg-[#F0FDF4] rounded-xl p-5 border border-[#BBF7D0] mb-6">
                                <div class="flex justify-between mb-2">
                                    <span class="text-[#14532D] font-semibold text-[13px]">Target prepay date</span>
                                    <span class="font-extrabold text-[#14532D]" id="outRenDate-${id}">-</span>
                                </div>
                                <div class="flex justify-between mb-2">
                                    <span class="text-[#14532D] font-semibold text-[13px]">Pre-pay savings</span>
                                    <span class="font-extrabold text-[#14532D]" id="outSavings-${id}">$0.00</span>
                                </div>
                                <div class="flex justify-between border-t border-[#BBF7D0] pt-2 mt-2">
                                    <span class="text-[#14532D] font-extrabold text-[13px]">Est. payoff balance</span>
                                    <span class="font-extrabold text-[#14532D]" id="outBuyout-${id}">$0.00</span>
                                </div>
                            </div>

                            <div class="takeaway">
                                <span class="takeaway-eyebrow">What you tell the borrower</span>
                                <span id="takeaway-content-${id}"></span>
                            </div>

                            <div class="action-buttons flex flex-col gap-3 mt-5 no-print">
                                <button onclick="copyResults(${id})" class="lp-copy-btn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                    Copy Results
                                </button>
                                <button onclick="handleLendPaperSavePDF()" class="lp-print-btn">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                                    Save as PDF
                                </button>
                            </div>

                            <div class="mt-6 mb-4 flex justify-center">
                                <button onclick="toggleDetails(${id})" id="toggleDetailsBtn-${id}" class="lp-pill-btn">View Amortization Schedule ↓</button>
                            </div>

                            <div id="detailsWrap-${id}" class="hidden mb-8">
                                <div class="table-scroll-container">
                                    <table class="min-w-full text-left bg-white text-[12px]">
                                        <thead class="bg-[#F9FAFB] sticky top-0 border-b border-[#E5E7EB]">
                                            <tr>
                                                <th class="p-3 font-bold text-[#111827]">Date</th>
                                                <th class="p-3 font-bold text-[#111827]">Payment</th>
                                                <th class="p-3 font-bold text-[#111827]">Principal</th>
                                                <th class="p-3 font-bold text-[#111827]">Interest</th>
                                                <th class="p-3 font-bold text-[#111827]">Balance</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBody-${id}" class="divide-y divide-[#F3F4F6]"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="hidden print:block border-t border-[#E5E7EB] pt-8 px-[32px] pb-[40px] mt-4">
                    <div class="text-[14px] font-black text-[#111827] mb-6 uppercase tracking-[0.1em] border-b-4 border-[#111827] pb-3">Complete Payment Schedule</div>
                    <table class="min-w-full text-left text-[11px]">
                        <thead>
                            <tr class="border-b-2 border-[#111827]">
                                <th class="py-3 font-black text-[#111827] uppercase">Date</th>
                                <th class="py-3 font-black text-[#111827] uppercase">Payment</th>
                                <th class="py-3 font-black text-[#111827] uppercase">Principal</th>
                                <th class="py-3 font-black text-[#111827] uppercase">Interest</th>
                                <th class="py-3 font-black text-[#111827] uppercase text-right">Balance</th>
                            </tr>
                        </thead>
                        <tbody id="printTableBody-${id}" class="divide-y divide-[#E5E7EB]"></tbody>
                    </table>
                </div>

                <div class="px-[24px] py-[16px] bg-[#F9FAFB] border-t border-[#E5E7EB] text-[11px] font-bold uppercase text-[#94A3B8] text-center tracking-widest hidden md:block no-print">
                    Figures are estimates for informational purposes only. Actual terms determined by lender upon final review.
                </div>
            </div>
            `;
            document.getElementById('cardsContainer').insertAdjacentHTML('beforeend', cardHTML);
            updateHeaders();
        }

        function toggleDetails(id) {
            const wrap = document.getElementById(`detailsWrap-${id}`);
            const btn = document.getElementById(`toggleDetailsBtn-${id}`);
            const isHidden = wrap.classList.toggle('hidden');
            btn.textContent = isHidden ? "View Amortization Schedule ↓" : "Hide Amortization Schedule ↑";
        }

        function removeCard(id) {
            const el = document.getElementById(`cardContainer-${id}`);
            if(el) { el.remove(); updateHeaders(); }
        }

        function calcCard(id) {
            const el = document.getElementById(`cardContainer-${id}`);
            if(!el) return;

            const amt = cleanNumericInput(document.getElementById(`amt-${id}`).value);
            const factor = cleanNumericInput(document.getElementById(`factor-${id}`).value);
            const term = cleanNumericInput(document.getElementById(`term-${id}`).value);
            const feePct = cleanNumericInput(document.getElementById(`fee-${id}`).value) || 0;
            const freq = document.getElementById(`freq-${id}`).value;
            const startDateStr = document.getElementById(`start-${id}`).value;
            const isPrepayEnabled = document.getElementById(`enablePrepay-${id}`).checked;
            const renPct = cleanNumericInput(document.getElementById(`renPct-${id}`).value) || 0;
            const discPct = cleanNumericInput(document.getElementById(`discPct-${id}`).value) || 0;

            if(!amt || !factor || !term) return;

            const payback = amt * factor;
            const feeAmt = amt * (feePct / 100);
            const netFunded = amt - feeAmt;
            const totalCost = payback - amt;
            let startDate = parseLocalDate(startDateStr);

            let periods, pmtLabel, pYear, freqName;
            if (freq === 'daily') { periods = Math.round(term * 21.66); pmtLabel = 'Daily payment'; pYear = 252; freqName = 'day'; }
            else if (freq === 'weekly') { periods = Math.round(term * 4.333); pmtLabel = 'Weekly payment'; pYear = 52; freqName = 'week'; }
            else if (freq === 'semimonthly') { periods = term * 2; pmtLabel = 'Semi-mo payment'; pYear = 24; freqName = 'semi-month'; }
            else { periods = term; pmtLabel = 'Monthly payment'; pYear = 12; freqName = 'month'; }

            const pmt = payback / periods;
            const truePeriodRate = getPeriodRate(netFunded, pmt, periods);
            const apr = truePeriodRate * pYear * 100;

            document.getElementById(`lblPmt-${id}`).innerText = pmtLabel;
            document.getElementById(`valPmt-${id}`).innerText = fmtUsd.format(pmt);
            document.getElementById(`outPayback-${id}`).innerText = fmtUsd.format(payback);
            document.getElementById(`outInterest-${id}`).innerText = fmtUsd.format(totalCost);
            document.getElementById(`outCents-${id}`).innerText = ((totalCost / amt) * 100).toFixed(1) + '¢';
            document.getElementById(`outApr-${id}`).innerText = apr.toFixed(1) + '%';
            
            let balance = amt, unearnedInterest = totalCost, cumulativePrincipal = 0, currentDate = new Date(startDate);
            let tbodyHTML = '', printTbodyHTML = '', targetHit = false, savedRenDate = '-', savedSavings = 0, savedBuyout = 0;

            const periodRate = getPeriodRate(amt, pmt, periods);

            for(let i = 1; i <= periods; i++) {
                if(freq === 'daily') currentDate = getNextBusinessDay(currentDate, false);
                else if(freq === 'weekly') currentDate = addDaysCalendarRolling(currentDate, 7, false);
                else if(freq === 'semimonthly') currentDate = addDaysCalendarRolling(currentDate, 15, false);
                else currentDate = addMonthsCalendarRolling(currentDate, 1, false);

                let interest = balance * periodRate;
                let principal = pmt - interest;
                if(i === periods || balance - principal < 0.01) { principal = balance; interest = Math.max(0, pmt - principal); }

                balance -= principal;
                cumulativePrincipal += principal;
                unearnedInterest -= interest;
                if(unearnedInterest < 0) unearnedInterest = 0;
                if(balance < 0) balance = 0;

                if(isPrepayEnabled && (cumulativePrincipal / amt * 100) >= renPct && !targetHit) {
                    targetHit = true;
                    savedRenDate = currentDate.toLocaleDateString();
                    savedSavings = unearnedInterest * (discPct / 100);
                    savedBuyout = balance + unearnedInterest - savedSavings;
                }

                const row = `
                    <td class="p-3 font-medium text-[#64748B]">${currentDate.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'2-digit'})}</td>
                    <td class="p-3 font-bold">${fmtUsd.format(pmt)}</td>
                    <td class="p-3">${fmtUsd.format(principal)}</td>
                    <td class="p-3">${fmtUsd.format(interest)}</td>
                    <td class="p-3 font-extrabold text-[#14532D]">${fmtUsd.format(balance)}</td>`;
                tbodyHTML += `<tr class="${targetHit && i === periods ? 'bg-[#F0FDF4]' : ''}">${row}</tr>`;
                printTbodyHTML += `<tr>${row.replace('text-right', '')}</tr>`;
                if(balance <= 0) break;
            }

            document.getElementById(`tableBody-${id}`).innerHTML = tbodyHTML;
            document.getElementById(`printTableBody-${id}`).innerHTML = printTbodyHTML;
            document.getElementById(`outRenDate-${id}`).innerText = savedRenDate;
            document.getElementById(`outSavings-${id}`).innerText = fmtUsd.format(savedSavings);
            document.getElementById(`outBuyout-${id}`).innerText = fmtUsd.format(savedBuyout);

            // Talking point
            let takeaway = `"You're looking at <strong>${fmtUsd.format(pmt)} per ${freqName}</strong> over ${term} months — repaying <strong>${fmtUsd.format(payback)} total</strong>`;
            if (isPrepayEnabled && savedSavings > 0) {
                takeaway += `. Paying off early could save you <strong>${fmtUsd.format(savedSavings)}</strong> in interest`;
            }
            takeaway += `."`;
            document.getElementById(`takeaway-content-${id}`).innerHTML = takeaway;
            
            el.dataset.payload = `Breakdown | Amt: ${fmtUsd.format(amt)} | Term: ${term} mos | Pmt: ${fmtUsd.format(pmt)} | Payback: ${fmtUsd.format(payback)}`;
        }

        function copyResults(id) {
            navigator.clipboard.writeText(document.getElementById(`cardContainer-${id}`).dataset.payload);
            const t = document.getElementById('toast'); t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        window.onload = () => {
            addCard();
            if (window.self !== window.top) document.body.classList.add('is-embedded');
        };
    </script>
</body>
</html>

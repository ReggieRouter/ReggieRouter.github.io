<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amo schedule | LendPaper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../public/assets/brand/favicon.svg">
    <link rel="apple-touch-icon" href="../public/assets/brand/apple-touch-icon-180x180.png">
    <style>
        /* Typography & Core Variables */
        :root {
            --brand-primary: #111827;
            --brand-secondary: #6B7280;
            --brand-accent: #14532D;
            --brand-accent-hover: #065F46;
            --brand-tint: #F0FDF4;
            --brand-border: #E5E7EB;
            --brand-warning: #F59E0B;
            --brand-error: #EF4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #FAFAFA;
            color: var(--brand-primary);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Tooltip Component Standard */
        .tooltip { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .tooltip .tooltiptext {
            visibility: hidden; 
            background-color: #FFFFFF; 
            color: var(--brand-primary);
            text-align: left; 
            border: 1px solid var(--brand-border);
            border-radius: 6px; 
            padding: 8px; 
            position: absolute;
            z-index: 9999; 
            bottom: 125%; 
            opacity: 0; 
            transition: opacity 0.2s;
            font-size: 12px; 
            font-weight: normal; 
            line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            text-transform: none; 
            letter-spacing: normal;
            max-width: 220px;
            width: max-content;
        }
        .tooltip-left-anchor .tooltiptext { left: 0; transform: translateX(-20%); }
        .tooltip-right-anchor .tooltiptext { right: 0; transform: translateX(20%); }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        /* Input Overrides */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }
        
        input[type=checkbox] {
            accent-color: var(--brand-accent);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .lp-input-group {
            display: flex;
            align-items: center;
            border: 1px solid var(--brand-border);
            border-radius: 6px;
            background-color: #FFFFFF;
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
        }
        .lp-input-group:focus-within {
            border-color: var(--brand-accent);
            box-shadow: 0 0 0 2px rgba(20, 83, 45, 0.2);
            outline: none;
        }
        .lp-input-group.has-error {
            border-color: var(--brand-error);
        }
        .lp-input-group.has-warning {
            border-color: var(--brand-warning);
        }
        .lp-input {
            width: 100%;
            padding: 8px 12px;
            outline: none;
            color: var(--brand-primary);
            font-size: 13px;
            background: transparent;
        }

        /* Layout specific */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            padding-top: 24px;
            padding-bottom: 80px;
        }
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            padding: 0 24px;
            width: 100%;
            margin: auto 0;
        }
        
        /* lp-definition for calculator instructions */
        .lp-definition {
            background-color: transparent;
            border: none;
            border-left: 3px solid var(--brand-accent);
            color: #64748b;
            font-size: 11px;
            line-height: 1.6;
            padding-left: 12px;
            margin-bottom: 24px;
        }

        /* Amortization Details */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        /* Action Buttons Standard */
        .lp-copy-btn {
            background-color: var(--brand-accent);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }
        .lp-copy-btn:hover { background-color: var(--brand-accent-hover); }

        /* Embedded state adjustments */
        body.is-embedded { background-color: #fff; }
        body.is-embedded main { padding-top: 8px; }

        .lp-print-btn {
            background-color: transparent;
            color: var(--brand-accent);
            padding: 14px;
            border: 2px solid var(--brand-accent);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }
        .lp-print-btn:hover { background-color: var(--brand-tint); }

        /* Print Export Standards */
        .print-header-content { display: none; }
        @media print {
            body { 
                background: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                padding: 0;
            }
            .no-print, header, .action-buttons, .tooltiptext { display: none !important; }
            .print-header-content {
                display: block !important;
                text-align: center;
                margin-bottom: 32px;
                padding-top: 20px;
            }
            .print-header-content img {
                height: 32px;
                margin: 0 auto 12px auto;
            }
            .print-header-content h1 {
                font-size: 18px;
                font-weight: 700;
                color: var(--brand-primary);
                margin: 0;
            }
            .modal-shell {
                box-shadow: none !important;
                border: none !important;
                max-width: 100% !important;
                margin: 0 auto !important;
            }
            .print-footer-legal {
                display: block !important;
                position: fixed;
                bottom: 20px;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10px;
                color: var(--brand-secondary);
                text-transform: uppercase;
                page-break-after: avoid;
            }
            .print-watermark {
                display: block !important;
                position: fixed;
                bottom: 0px;
                left: 0;
                right: 0;
                text-align: center;
                font-size: 10px;
                color: var(--brand-secondary);
                padding-bottom: 10px;
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body>

    <!-- Main Workspace -->
    <main class="w-full relative">
        <div class="print-header-content">
            <img src="../public/assets/brand/logo-lockup-light.svg" alt="LendPaper Logo">
            <h1>Amo schedule Report</h1>
        </div>
        
        <div id="cardsContainer" class="cards-container">
            <!-- Cards injected here via JS -->
        </div>

        <div class="flex justify-center mt-6 mb-12 no-print">
            <button onclick="addCard()" class="text-[13px] text-[#9CA3AF] hover:text-[#111827] flex items-center transition-colors font-medium outline-none">
                <span class="text-[16px] mr-1 leading-none">+</span> Add deal
            </button>
        </div>
    </main>

    <!-- Global Layout Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#111827] text-white px-4 py-2 rounded-md shadow-lg text-[13px] opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        Copied!
    </div>

    <!-- Print Baseline Constants -->
    <div class="hidden print-footer-legal">
        THESE FIGURES ARE ESTIMATES FOR INFORMATIONAL PURPOSES ONLY. ACTUAL LOAN TERMS, RATES, AND FEES WILL BE DETERMINED BY THE LENDER UPON FINAL REVIEW.
    </div>
    <div class="hidden print-watermark">
        Powered by LendPaper | info@lendpaper.com | lendpaper.com — Custom branding available
    </div>

    <script>
        const fmtUsd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
        
        // Negative value handling configuration schema
        const schema = {
            allowNegative: ['monthlyRevenue', 'netIncome'], 
            preventNegative: ['amt', 'factor', 'term', 'fee', 'renPct', 'discPct']
        };

        const holidays = [
            "2024-01-01", "2024-01-15", "2024-02-19", "2024-05-27", "2024-06-19", "2024-07-04", "2024-09-02", "2024-10-14", "2024-11-11", "2024-11-28", "2024-12-25",
            "2025-01-01", "2025-01-20", "2025-02-17", "2025-05-26", "2025-06-19", "2025-07-04", "2025-09-01", "2025-10-13", "2025-11-11", "2025-11-27", "2025-12-25"
        ];

        function isBusinessDay(date, skipHolidays) {
            const day = date.getDay();
            if(day === 0 || day === 6) return false;
            if(skipHolidays) {
                const dateStr = date.toISOString().split('T')[0];
                if(holidays.includes(dateStr)) return false;
            }
            return true;
        }

        function addDaysCalendarRolling(startDate, days, skipHolidays) {
            let next = new Date(startDate);
            next.setDate(next.getDate() + days);
            while(!isBusinessDay(next, skipHolidays)) {
                next.setDate(next.getDate() + 1);
            }
            return next;
        }

        function addMonthsCalendarRolling(startDate, months, skipHolidays) {
            let next = new Date(startDate);
            const targetDay = next.getDate();
            next.setMonth(next.getMonth() + months);
            // Handle month-end overflow (e.g. Jan 31 + 1mo = Mar 3 in JS; snap back to Feb 28/29)
            if (next.getDate() !== targetDay) {
                next.setDate(0);
            }
            while(!isBusinessDay(next, skipHolidays)) {
                next.setDate(next.getDate() + 1);
            }
            return next;
        }

        function getNextBusinessDay(startDate, skipHolidays) {
            let next = new Date(startDate);
            next.setDate(next.getDate() + 1);
            while(!isBusinessDay(next, skipHolidays)) {
                next.setDate(next.getDate() + 1);
            }
            return next;
        }

        function parseLocalDate(yyyyMmDd) {
            if (!yyyyMmDd || typeof yyyyMmDd !== 'string') return new Date();
            const parts = yyyyMmDd.split('-');
            if (parts.length !== 3) return new Date();
            const [y, m, d] = parts.map(Number);
            if (!y || !m || !d) return new Date();
            return new Date(y, m - 1, d);
        }

        function getPeriodRate(pv, pmt, n) {
            let low = 0, high = 1;
            for(let i=0; i<50; i++) {
                let mid = (low + high) / 2;
                let calcPv = pmt * (1 - Math.pow(1 + mid, -n)) / mid;
                if(calcPv > pv) low = mid; else high = mid;
            }
            return (low + high) / 2;
        }

        function cleanNumericInput(val) {
            const num = parseFloat(val);
            return isNaN(num) ? null : num;
        }

        function handleBlurValidation(el) {
            const val = parseFloat(el.value);
            const baseId = el.id.split('-')[0];
            const wrapper = el.closest('.lp-input-group');
            
            if (schema.preventNegative.includes(baseId) && val < 0) {
                wrapper.classList.add('has-warning');
            } else {
                wrapper.classList.remove('has-warning');
            }
        }

        function togglePrepay(id) {
            const isChecked = document.getElementById(`enablePrepay-${id}`).checked;
            const section = document.getElementById(`prepaySection-${id}`);
            const summary = document.getElementById(`prepaySummary-${id}`);
            
            if (isChecked) {
                section.classList.remove('hidden');
                summary.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
                summary.classList.add('hidden');
            }
        }

        function updateHeaders() {
            const cards = document.querySelectorAll('.modal-shell');
            const totalCount = cards.length;

            cards.forEach((card, index) => {
                const id = card.id.split('-')[1];
                const headerCenter = document.getElementById(`header-center-${id}`);
                const badgeContainer = document.getElementById(`badge-container-${id}`);
                const scenarioLetter = String.fromCharCode(64 + (index + 1)); // A, B, C...

                if (totalCount === 1) {
                    headerCenter.innerHTML = `
                        <h1 class="text-[14px] font-medium text-[#111827]">Amo schedule</h1>
                        <div class="text-[10px] uppercase tracking-[0.05em] text-[#6B7280] leading-none mt-1">Multi-scenario amortization and prepay engine</div>
                    `;
                    badgeContainer.innerHTML = '';
                    badgeContainer.classList.add('hidden');
                    card.dataset.scenarioName = "Amo Schedule";
                } else {
                    headerCenter.innerHTML = `
                        <h1 class="text-[14px] font-medium text-[#111827]">Amo schedule</h1>
                        <div class="text-[10px] uppercase tracking-[0.05em] text-[#6B7280] leading-none mt-1">Multi-scenario amortization and prepay engine</div>
                    `;
                    badgeContainer.innerHTML = `<span class="px-[6px] py-[3px] text-[10px] font-bold uppercase bg-[#F0FDF4] text-[#14532D] rounded-[4px] tracking-[0.05em] leading-none border border-[#BBF7D0]">SCENARIO ${scenarioLetter}</span>`;
                    badgeContainer.classList.remove('hidden');
                    card.dataset.scenarioName = `Scenario ${scenarioLetter}`;
                }
                // Force payload refresh to inherit accurate name context
                calcCard(id);
            });
        }

        let maxId = 0;

        function addCard() {
            maxId++;
            const id = maxId;
            const today = new Date().toISOString().split('T')[0];

            const cardHTML = `
            <div class="modal-shell w-full max-w-[760px] bg-white rounded-[12px] shadow-[0_2px_8px_rgba(0,0,0,0.08)] border border-[#E5E7EB] overflow-hidden flex flex-col relative no-break-inside" id="cardContainer-${id}">
                
                <!-- Fixed Header Spec -->
                <div class="h-[56px] px-[24px] flex items-center justify-between border-b border-[#E5E7EB] bg-white shrink-0">
                    <div class="text-[20px] leading-none tracking-tight">
                        <span class="font-[800] text-[#111827]">lend</span><span class="font-[300] text-[#6B7280]">paper</span><span class="text-[#14532D]">.</span>
                    </div>
                    <div class="flex flex-col items-center text-center" id="header-center-${id}">
                        <!-- Injected via updateHeaders() -->
                    </div>
                    <button onclick="removeCard(${id})" class="w-[32px] h-[32px] rounded-full hover:bg-slate-50 flex items-center justify-center text-[#6B7280] text-[20px] leading-none no-print transition-colors hover:text-[#EF4444]">&times;</button>
                </div>

                <!-- Left/Right Panel Standard -->
                <div class="flex flex-col md:flex-row p-[24px] gap-[24px]">
                    
                    <!-- Left: Inputs -->
                    <div class="w-full md:w-[50%] flex flex-col gap-4 relative">
                        
                        <div class="lp-definition">
                            Calculates amortization schedules and potential pre-payment scenarios across various funding frequencies.
                        </div>

                        <!-- Living Title Scenario Badge Injection Point -->
                        <div id="badge-container-${id}" class="hidden w-max mb-1"></div>

                        <div class="grid grid-cols-2 gap-4">
                            <!-- Amount -->
                            <div class="col-span-2">
                                <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1">Amount</label>
                                <div class="lp-input-group">
                                    <span class="pl-3 pr-2 text-[#6B7280] border-r border-[#E5E7EB]">$</span>
                                    <input type="number" id="amt-${id}" value="100000" min="0" class="lp-input" oninput="calcCard(${id})" onblur="handleBlurValidation(this)">
                                </div>
                            </div>

                            <!-- Factor Rate -->
                            <div>
                                <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1 flex items-center">
                                    Factor Rate
                                    <span class="tooltip ml-1 no-print">
                                        <span class="w-[14px] h-[14px] inline-flex items-center justify-center rounded-full border border-[#6B7280] text-[#6B7280] text-[10px] font-serif italic hover:border-[#14532D] hover:text-[#14532D] transition-colors bg-white">i</span>
                                        <span class="tooltiptext">Also called cents on the dollar — a decimal multiplier on the advance amount.</span>
                                    </span>
                                </label>
                                <div class="lp-input-group">
                                    <input type="number" step="0.01" id="factor-${id}" value="${id===1 ? 1.25 : 1.30}" min="0" class="lp-input" oninput="calcCard(${id})" onblur="handleBlurValidation(this)">
                                </div>
                            </div>

                            <!-- Term -->
                            <div>
                                <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1">Term</label>
                                <div class="lp-input-group">
                                    <input type="number" id="term-${id}" value="${id===1 ? 12 : 18}" min="0" class="lp-input text-right" oninput="calcCard(${id})" onblur="handleBlurValidation(this)">
                                    <span class="pr-3 pl-2 text-[#6B7280]">mos</span>
                                </div>
                            </div>

                            <!-- O-Fee -->
                            <div>
                                <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1 flex items-center">
                                    O-Fee
                                    <span class="tooltip tooltip-left-anchor ml-1 no-print">
                                        <span class="w-[14px] h-[14px] inline-flex items-center justify-center rounded-full border border-[#6B7280] text-[#6B7280] text-[10px] font-serif italic hover:border-[#14532D] hover:text-[#14532D] transition-colors bg-white">i</span>
                                        <span class="tooltiptext">Deducted from the total financed amount. Usually non-refundable if pre-paid early.</span>
                                    </span>
                                </label>
                                <div class="lp-input-group">
                                    <input type="number" step="0.1" id="fee-${id}" value="3.0" min="0" class="lp-input text-right" oninput="calcCard(${id})" onblur="handleBlurValidation(this)">
                                    <span class="pr-3 pl-2 text-[#6B7280]">%</span>
                                </div>
                            </div>

                            <!-- Frequency -->
                            <div>
                                <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1">Frequency</label>
                                <div class="lp-input-group pr-2">
                                    <select id="freq-${id}" class="w-full py-2 px-3 outline-none text-[#111827] text-[13px] bg-transparent appearance-none cursor-pointer" onchange="calcCard(${id})">
                                        <option value="daily">Daily</option>
                                        <option value="weekly" selected>Weekly</option>
                                        <option value="semimonthly">Semi-Mo</option>
                                        <option value="monthly">Monthly</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Prepay Optional Inputs -->
                        <div class="mt-4 pt-4 border-t border-[#E5E7EB]">
                            <!-- Start Date -->
                            <div class="mb-4">
                                <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1">Start Date</label>
                                <div class="lp-input-group">
                                    <input type="date" id="start-${id}" value="${today}" class="lp-input" onchange="calcCard(${id})">
                                </div>
                            </div>

                            <label class="flex items-center cursor-pointer group mb-3 w-max select-none">
                                <input type="checkbox" id="enablePrepay-${id}" class="rounded border-[#E5E7EB] focus:ring-[#14532D]" onchange="togglePrepay(${id}); calcCard(${id})">
                                <span class="ml-2 text-[12px] uppercase tracking-[0.05em] text-[#14532D] font-semibold group-hover:text-[#065F46] transition-colors">Prepay</span>
                            </label>
                            
                            <div id="prepaySection-${id}" class="hidden grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1">Target Paid Down</label>
                                    <div class="lp-input-group">
                                        <input type="number" id="renPct-${id}" value="50" min="0" class="lp-input text-right" oninput="calcCard(${id})" onblur="handleBlurValidation(this)">
                                        <span class="pr-3 pl-2 text-[#6B7280]">%</span>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-[11px] uppercase tracking-[0.05em] text-[#6B7280] mb-1">Pre-Pay Discount</label>
                                    <div class="lp-input-group">
                                        <input type="number" id="discPct-${id}" value="25" min="0" class="lp-input text-right" oninput="calcCard(${id})" onblur="handleBlurValidation(this)">
                                        <span class="pr-3 pl-2 text-[#6B7280]">%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Outputs -->
                    <div class="w-full md:w-[50%] flex flex-col justify-between">
                        <div>
                            <!-- Hero Number -->
                            <div class="mb-5 pb-5 border-b border-[#E5E7EB]">
                                <div class="text-[13px] text-[#6B7280] mb-1 capitalize" id="lblPmt-${id}">Est. payment</div>
                                <div class="text-[34px] font-bold text-[#14532D] leading-none tracking-tight group relative inline-block cursor-default" id="outPmt-${id}">
                                    <span id="valPmt-${id}">$0.00</span>
                                    <div class="absolute top-full left-0 mt-1 text-[12px] font-normal text-[#6B7280] hidden group-hover:block whitespace-nowrap bg-white border border-[#E5E7EB] px-2 py-1 shadow-sm rounded z-10" id="hoverTrace-${id}">
                                        --
                                    </div>
                                </div>
                            </div>

                            <!-- Stats Grid -->
                            <div class="grid grid-cols-2 gap-y-4 gap-x-6 text-[13px] mb-6">
                                <div>
                                    <div class="text-[#6B7280] mb-0.5">Total payback</div>
                                    <div class="font-bold text-[#111827]" id="outPayback-${id}">$0.00</div>
                                </div>
                                <div>
                                    <div class="text-[#6B7280] mb-0.5">Total interest</div>
                                    <div class="font-bold text-[#111827]" id="outInterest-${id}">$0.00</div>
                                </div>
                                <div>
                                    <div class="text-[#6B7280] mb-0.5">Factor cost (¢/$)</div>
                                    <div class="font-bold text-[#111827]" id="outCents-${id}">0¢</div>
                                </div>
                                <div>
                                    <div class="text-[#6B7280] mb-0.5">APR (Actuarial)</div>
                                    <div class="font-bold text-[#111827]" id="outApr-${id}">0%</div>
                                </div>
                            </div>

                            <!-- Target Renewal Summary (Green Tint block) -->
                            <div id="prepaySummary-${id}" class="hidden bg-[#F0FDF4] rounded-[6px] p-4 text-[13px] border border-[#BBF7D0] mb-5">
                                <div class="flex justify-between mb-2">
                                    <span class="text-[#14532D]">Target prepay date</span>
                                    <span class="font-bold text-[#14532D]" id="outRenDate-${id}">-</span>
                                </div>
                                <div class="flex justify-between mb-2">
                                    <span class="text-[#14532D]">Pre-pay savings</span>
                                    <span class="font-bold text-[#14532D]" id="outSavings-${id}">$0.00</span>
                                </div>
                                <div class="flex justify-between border-t border-[#BBF7D0] pt-2">
                                    <span class="text-[#14532D] font-bold">Est. payoff balance</span>
                                    <span class="font-bold text-[#14532D]" id="outBuyout-${id}">$0.00</span>
                                </div>
                            </div>

                            <!-- Amortization Dropdown -->
                            <details class="group mb-6 no-print">
                                <summary class="text-[13px] text-[#6B7280] cursor-pointer hover:underline outline-none select-none">
                                    View amortization schedule &darr;
                                </summary>
                                <div class="mt-3 max-h-[240px] overflow-auto border border-[#E5E7EB] rounded-[6px] text-[12px]">
                                    <table class="min-w-full text-left bg-white">
                                        <thead class="bg-[#FAFAFA] sticky top-0 border-b border-[#E5E7EB]">
                                            <tr>
                                                <th class="p-2 font-semibold text-[#111827] whitespace-nowrap">Date</th>
                                                <th class="p-2 font-semibold text-[#111827] whitespace-nowrap">PMT</th>
                                                <th class="p-2 font-semibold text-[#111827] whitespace-nowrap">Prin</th>
                                                <th class="p-2 font-semibold text-[#111827] whitespace-nowrap">Int</th>
                                                <th class="p-2 font-semibold text-[#111827] whitespace-nowrap">Balance</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBody-${id}" class="divide-y divide-[#E5E7EB]">
                                        </tbody>
                                    </table>
                                </div>
                            </details>
                        </div>

                        <!-- Action Buttons -->
                        <div class="action-buttons flex flex-col gap-3 mt-auto">
                            <button onclick="copyResults(${id})" class="lp-copy-btn no-print">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy
                            </button>
                            <button onclick="window.print()" class="lp-print-btn no-print">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                                Save PDF
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Print-only Full Schedule Section -->
                <div class="hidden print:block border-t border-[#E5E7EB] pt-8 px-[24px] pb-[40px] mt-4">
                    <div class="text-[12px] font-bold text-[#111827] mb-4 uppercase tracking-[0.1em] border-b-2 border-[#111827] pb-2">Full Amortization Schedule</div>
                    <table class="min-w-full text-left text-[10px]">
                        <thead>
                            <tr class="border-b border-[#E5E7EB]">
                                <th class="py-2 font-bold text-[#111827]">Date</th>
                                <th class="py-2 font-bold text-[#111827]">Payment</th>
                                <th class="py-2 font-bold text-[#111827]">Principal</th>
                                <th class="py-2 font-bold text-[#111827]">Interest</th>
                                <th class="py-2 font-bold text-[#111827] text-right">Balance</th>
                            </tr>
                        </thead>
                        <tbody id="printTableBody-${id}" class="divide-y divide-[#E5E7EB]">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Footer Legal Constraint Base -->
                <div class="px-[24px] py-[12px] bg-[#FAFAFA] border-t border-[#E5E7EB] text-[10px] uppercase text-[#6B7280] text-center tracking-wide hidden md:block no-print">
                    These figures are estimates for informational purposes only. Actual loan terms, rates, and fees will be determined by the lender upon final review.
                </div>
            </div>
            `;
            document.getElementById('cardsContainer').insertAdjacentHTML('beforeend', cardHTML);
            updateHeaders(); // Resolves titles and forces a strict recalc
        }

        function removeCard(id) {
            const el = document.getElementById(`cardContainer-${id}`);
            if(el) { 
                el.remove(); 
                updateHeaders();
            }
        }

        function calcCard(id) {
            const el = document.getElementById(`cardContainer-${id}`);
            if(!el) return;

            const scenarioName = el.dataset.scenarioName || 'Amo Schedule';
            const amt = cleanNumericInput(document.getElementById(`amt-${id}`).value);
            const factor = cleanNumericInput(document.getElementById(`factor-${id}`).value);
            const term = cleanNumericInput(document.getElementById(`term-${id}`).value);
            const feePct = cleanNumericInput(document.getElementById(`fee-${id}`).value) || 0;
            const freq = document.getElementById(`freq-${id}`).value;
            const startDateStr = document.getElementById(`start-${id}`).value;
            const isPrepayEnabled = document.getElementById(`enablePrepay-${id}`).checked;
            const renPct = cleanNumericInput(document.getElementById(`renPct-${id}`).value) || 0;
            const discPct = cleanNumericInput(document.getElementById(`discPct-${id}`).value) || 0;

            const dash = "—";

            if(amt === null || factor === null || term === null || term === 0) {
                document.getElementById(`outPmt-${id}`).innerText = dash;
                document.getElementById(`outPayback-${id}`).innerText = dash;
                document.getElementById(`outInterest-${id}`).innerText = dash;
                document.getElementById(`outCents-${id}`).innerText = dash;
                document.getElementById(`outApr-${id}`).innerText = dash;
                document.getElementById(`hoverTrace-${id}`).innerText = "";
                document.getElementById(`tableBody-${id}`).innerHTML = "";
                if(document.getElementById(`printTableBody-${id}`)) document.getElementById(`printTableBody-${id}`).innerHTML = "";
                return;
            }

            const payback = amt * factor;
            const feeAmt = amt * (feePct / 100);
            const netFunded = amt - feeAmt;
            const totalCost = payback - amt;
            let startDate = parseLocalDate(startDateStr);

            let periods, pmtLabel, periodsPerYear;
            let daysPerMonth = 21.66;

            if (freq === 'daily') {
                periods = Math.round(term * daysPerMonth);
                pmtLabel = 'Daily payment';
                periodsPerYear = Math.round(12 * daysPerMonth);
            } else if (freq === 'weekly') {
                periods = Math.round(term * 4.333);
                pmtLabel = 'Weekly payment';
                periodsPerYear = 52;
            } else if (freq === 'semimonthly') {
                periods = term * 2;
                pmtLabel = 'Semi-mo payment';
                periodsPerYear = 24;
            } else if (freq === 'monthly') {
                periods = term;
                pmtLabel = 'Monthly payment';
                periodsPerYear = 12;
            }

            const pmt = payback / periods;
            const cents = (totalCost / amt) * 100;

            const periodRate = getPeriodRate(amt, pmt, periods); 
            const truePeriodRate = getPeriodRate(netFunded, pmt, periods);
            const apr = truePeriodRate * periodsPerYear * 100;

            document.getElementById(`lblPmt-${id}`).innerText = pmtLabel;
            document.getElementById(`valPmt-${id}`).innerText = fmtUsd.format(pmt);
            document.getElementById(`outPayback-${id}`).innerText = fmtUsd.format(payback);
            document.getElementById(`outInterest-${id}`).innerText = fmtUsd.format(totalCost);
            document.getElementById(`outCents-${id}`).innerText = cents.toFixed(1) + '¢';
            document.getElementById(`outApr-${id}`).innerText = apr.toFixed(1) + '%';
            
            document.getElementById(`hoverTrace-${id}`).innerText = `${fmtUsd.format(amt)} * ${factor} ÷ ${periods} ${freq} payments`;

            let balance = amt;
            let unearnedInterest = totalCost;
            let cumulativePrincipal = 0;
            let currentDate = new Date(startDate);
            let tbodyHTML = '';
            let printTbodyHTML = '';
            let targetHit = false;
            let savedRenDate = '-', savedSavings = 0, savedBuyout = 0;

            const maxRows = Math.min(periods, 1500);

            for(let i = 1; i <= maxRows; i++) {
                if(freq === 'daily') {
                    currentDate = getNextBusinessDay(currentDate, false);
                } else if(freq === 'weekly') {
                    currentDate = addDaysCalendarRolling(currentDate, 7, false);
                } else if(freq === 'semimonthly') {
                    currentDate = addDaysCalendarRolling(currentDate, 15, false);
                } else if(freq === 'monthly') {
                    currentDate = addMonthsCalendarRolling(currentDate, 1, false);
                }

                let interest = balance * periodRate;
                let principal = pmt - interest;
                
                if(i === maxRows || balance - principal < 0.01) {
                    principal = balance;
                    interest = pmt - principal;
                    if(interest < 0) interest = 0;
                }

                balance -= principal;
                cumulativePrincipal += principal;
                unearnedInterest -= interest;
                if(unearnedInterest < 0) unearnedInterest = 0;
                if(balance < 0) balance = 0;

                const pctPaid = (cumulativePrincipal / amt) * 100;
                
                let trStyle = "";
                let trClass = "hover:bg-[#F0FDF4]";
                
                if(isPrepayEnabled && pctPaid >= renPct && !targetHit) {
                    targetHit = true;
                    trStyle = "background-color: #F0FDF4; font-weight: 600; color: #14532D;";
                    savedRenDate = currentDate.toLocaleDateString();
                    savedSavings = unearnedInterest * (discPct / 100);
                    savedBuyout = balance + unearnedInterest - savedSavings;
                }

                const rowContent = `
                    <td class="p-2 whitespace-nowrap">${currentDate.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'2-digit'})}</td>
                    <td class="p-2 whitespace-nowrap">${fmtUsd.format(pmt)}</td>
                    <td class="p-2 whitespace-nowrap">${fmtUsd.format(principal)}</td>
                    <td class="p-2 whitespace-nowrap">${fmtUsd.format(interest)}</td>
                    <td class="p-2 font-medium whitespace-nowrap">${fmtUsd.format(balance)}</td>
                `;

                tbodyHTML += `<tr class="border-b border-[#E5E7EB] ${trClass}" style="${trStyle}">${rowContent}</tr>`;
                printTbodyHTML += `<tr class="border-b border-[#E5E7EB]" style="${trStyle.replace('hover:bg-[#F0FDF4]', '')}">${rowContent.replace('p-2', 'py-1.5')}</tr>`;

                if(balance <= 0) break;
            }

            document.getElementById(`tableBody-${id}`).innerHTML = tbodyHTML;
            if(document.getElementById(`printTableBody-${id}`)) {
                document.getElementById(`printTableBody-${id}`).innerHTML = printTbodyHTML;
            }
            document.getElementById(`outRenDate-${id}`).innerText = savedRenDate;
            document.getElementById(`outSavings-${id}`).innerText = fmtUsd.format(savedSavings);
            document.getElementById(`outBuyout-${id}`).innerText = fmtUsd.format(savedBuyout);
            
            el.dataset.payload = `${scenarioName} | Amt: ${fmtUsd.format(amt)} | Factor: ${factor} | Term: ${term} mos | Pmt: ${fmtUsd.format(pmt)} | Payback: ${fmtUsd.format(payback)} | APR: ${apr.toFixed(2)}%` + (isPrepayEnabled ? ` | Buyout: ${fmtUsd.format(savedBuyout)}` : "");
        }

        function copyResults(id) {
            const cardEl = document.getElementById(`cardContainer-${id}`);
            const payload = cardEl.dataset.payload;
            
            navigator.clipboard.writeText(payload).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            }).catch(err => {
                console.error("Failed to copy", err);
            });
        }

        window.onload = () => {
            addCard();
            if (window.self !== window.top) {
                document.body.classList.add('is-embedded');
            }
        };
    </script>
</body>
</html>

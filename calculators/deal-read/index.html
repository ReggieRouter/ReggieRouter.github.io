<style>
/* ════════════════════════════════════════════════════════════
   LendPaper · Deal Read — clean white / green calculator system
   ════════════════════════════════════════════════════════════ */
:root{
  --green:#1A3C2E; --green-dk:#0f2a1f; --green-wash:#eef5ef; --green-line:#cde3d2;
  --ink:#191e1b; --ink-2:#454b47; --muted:#8b918b; --faint:#aab0aa;
  --line:#e7e8e2; --line-2:#eff0ea; --bg:#fff; --bg-2:#f7f8f5;

  --t1:#1f7a4d; --t1-bg:#ecf4ee; --t1-line:#c8e3d0;
  --t2:#2563c4; --t2-bg:#ecf2fb; --t2-line:#c8dbf3;
  --t3:#a9750f; --t3-bg:#f8f1dd; --t3-line:#ebd9a8;
  --t4:#bb3a4e; --t4-bg:#fbecee; --t4-line:#f1c9cf;

  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,Menlo,monospace;
  --r:9px; --r-sm:7px; --r-lg:13px;
  --shadow:0 1px 2px rgba(20,40,30,.05);
  --shadow-lg:0 24px 60px -22px rgba(20,40,30,.5);
  --pad:30px; --gap:22px;
}
[data-density="compact"]{ --pad:22px; --gap:15px; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg-2);color:var(--ink);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-feature-settings:"tnum" 0;
}
.tnum{font-variant-numeric:tabular-nums}
::selection{background:var(--green);color:#fff}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.hi{color:var(--green);font-weight:700}
button{font-family:var(--font)}

/* ── Top bar ─────────────────────────────────────── */
.top{
  background:var(--bg);border-bottom:1px solid var(--line);
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:0 26px;height:66px;position:sticky;top:0;z-index:40;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;justify-self:start}
.wordmark{font-size:16.5px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
.wordmark span{color:var(--green)}
.top-title{text-align:center}
.tt-main{font-size:15px;font-weight:700;letter-spacing:.02em;color:var(--ink);text-transform:uppercase}
.tt-sub{font-size:9.5px;font-weight:600;letter-spacing:.17em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.top-right{justify-self:end;display:flex;align-items:center;gap:14px}
.modeseg{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
.modeseg button{font-size:11.5px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 13px;border-radius:999px;transition:all .16s;display:flex;align-items:center;gap:6px}
.modeseg button .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.45}
.modeseg button.on{background:var(--bg);color:var(--green);box-shadow:var(--shadow)}
.modeseg button.on .dot{background:var(--green);opacity:1}

/* ── Sheet ───────────────────────────────────────── */
.sheet{max-width:1200px;margin:0 auto;background:var(--bg);min-height:calc(100vh - 66px);border-left:1px solid var(--line);border-right:1px solid var(--line)}
.split{display:grid;grid-template-columns:1fr 1fr}
.col-in{border-right:1px solid var(--line);padding:26px var(--pad) 34px}
.col-read{padding:26px var(--pad) 34px}

/* ── intro tip ──────────────────────────────────── */
.tip{
  position:relative;background:var(--green-wash);border:1px solid var(--green-line);
  border-radius:var(--r);padding:15px 38px 15px 17px;margin-bottom:24px;
  font-size:13.5px;line-height:1.55;color:#274b38;
}
.tip b{color:var(--green);font-weight:700}
.tip-x{position:absolute;top:11px;right:11px;background:none;border:none;cursor:pointer;color:#6f9580;font-size:16px;line-height:1;padding:3px 6px;border-radius:6px}
.tip-x:hover{background:#dceadf;color:var(--green-dk)}
.tip.hidden{display:none}

/* ── input fields ───────────────────────────────── */
.in-sec-label{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.fields{display:flex;flex-direction:column;gap:17px}
.field{}
.field > label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field.req > label{color:var(--faint)}
.in-box{
  display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--line);
  border-radius:var(--r);height:50px;padding:0 14px;transition:border-color .15s,box-shadow .15s;cursor:text;
}
.in-box:focus-within{border-color:var(--green);box-shadow:0 0 0 3.5px var(--green-wash)}
.in-box .pre{font-size:15px;color:var(--muted);margin-right:4px}
.in-box .in-ico{display:flex;align-items:center;color:var(--faint);margin-right:10px;flex:0 0 auto}
.in-box:focus-within .in-ico{color:var(--faint)}
.in-box input{flex:1;min-width:0;border:none;outline:none;background:none;font-family:var(--font);font-size:16.5px;font-weight:600;color:var(--ink);width:100%}
.in-box input::placeholder{color:var(--faint);font-weight:400}
.in-box input::-webkit-outer-spin-button,.in-box input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.in-box .suf{font-size:12.5px;color:var(--muted);font-weight:600;margin-left:7px;flex:0 0 auto}
.in-tag{flex:0 0 auto;margin-left:8px}
.tg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
.tg .d{width:6px;height:6px;border-radius:50%}
.tg.err{color:var(--t4);background:var(--t4-bg);border-color:var(--t4-line)}
.field.invalid .in-box{border-color:var(--t4);box-shadow:0 0 0 3.5px var(--t4-bg)}
.in-stat{display:flex;align-items:center;gap:7px;margin-top:8px;min-height:14px;font-size:11.5px;font-weight:600}
.in-stat .sdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.in-stat .lever{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}

/* industry field: search + chip */
.ind-search{position:relative;display:flex;align-items:center}
.ind-search > svg{position:absolute;left:14px;color:var(--muted);pointer-events:none}
.ind-search input{width:100%;font-family:var(--font);font-size:15px;font-weight:600;color:var(--ink);background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r);height:50px;padding:0 14px 0 40px;outline:none;transition:border-color .15s,box-shadow .15s}
.ind-search input::placeholder{color:var(--faint);font-weight:400}
.ind-search input:focus{border-color:var(--green);box-shadow:0 0 0 3.5px var(--green-wash)}
.ind-res{margin-top:8px;max-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r);display:none;background:var(--bg)}
.ind-res.open{display:block}
.ind-res::-webkit-scrollbar{width:8px}.ind-res::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.ir-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--line-2)}
.ir-row:last-child{border-bottom:none}
.ir-row:hover{background:var(--bg-2)}
.ir-code{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green);background:var(--green-wash);border-radius:5px;padding:3px 6px}
.ir-name{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir-name mark{background:#f6e7a6;color:#6b5310;border-radius:2px}
.ir-tier{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.ir-tier .d{width:6px;height:6px;border-radius:50%}
.ir-gen{font-size:8.5px;font-weight:700;text-transform:uppercase;color:var(--t3);background:var(--t3-bg);border:1px solid var(--t3-line);border-radius:999px;padding:1px 6px;margin-left:6px}
.ind-chip{display:flex;align-items:center;gap:12px;background:var(--bg);border:1.5px solid var(--green-line);border-radius:var(--r);padding:11px 13px}
.ind-chip-code{font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;background:var(--green);border-radius:6px;padding:5px 8px;flex:0 0 auto}
.ind-chip-mid{min-width:0;flex:1}
.ind-chip-name{font-size:14.5px;font-weight:700;letter-spacing:-.01em;color:var(--ink);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ind-chip-tier{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:3px}
.ind-chip-tier .d{width:6px;height:6px;border-radius:50%}
.ind-change{font-size:11px;font-weight:600;color:var(--green);background:var(--bg);border:1px solid var(--green-line);border-radius:7px;padding:6px 10px;cursor:pointer;flex:0 0 auto;transition:all .14s}
.ind-change:hover{background:var(--green-wash)}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.quick button{font-size:11.5px;font-weight:600;color:var(--green);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;transition:all .14s}
.quick button:hover{border-color:var(--green-line);background:var(--green-wash)}

/* requested amount sep */
.opt-sep{display:flex;align-items:center;gap:10px;margin:24px 0 17px}
.opt-sep .ln{flex:1;height:1px;background:var(--line)}
.opt-sep .lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}

/* ── expectations & context panel ── */
.exp-toggle{display:flex;align-items:center;gap:11px;width:100%;background:var(--green-wash);border:1px solid var(--green-line);border-radius:var(--r);padding:13px 15px;cursor:pointer;text-align:left;transition:all .15s}
.exp-toggle:hover{border-color:var(--green)}
.exp-toggle .et-plus{width:24px;height:24px;border-radius:7px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:16px;font-weight:600;line-height:1}
.exp-toggle .et-main{min-width:0;flex:1}
.exp-toggle .et-t{font-size:13px;font-weight:700;color:var(--green-dk);line-height:1.2}
.exp-toggle .et-h{font-size:11px;color:#4e7a60;margin-top:2px;font-weight:500}
.exp-toggle .et-count{font-size:10px;font-weight:700;color:#fff;background:var(--green);border-radius:999px;padding:2px 8px;flex:0 0 auto}
.exp-toggle .fac-chev{color:var(--green);flex:0 0 auto}
.exp-panel{display:none;margin-top:13px;padding:16px;border:1px solid var(--line);border-radius:var(--r);background:var(--bg)}
.exp-panel.open{display:block}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.exp-grid .field{margin:0}
.exp-grid .field.full{grid-column:1 / -1}
.sel-box{position:relative;display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r);height:44px;padding:0 12px;transition:border-color .15s,box-shadow .15s}
.sel-box:focus-within{border-color:var(--green);box-shadow:0 0 0 3px var(--green-wash)}
.sel-box .pre{font-size:14px;color:var(--muted);margin-right:4px}
.sel-box select{flex:1;border:none;outline:none;background:none;font-family:var(--font);font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer;appearance:none;-webkit-appearance:none}
.sel-box input{flex:1;min-width:0;border:none;outline:none;background:none;font-family:var(--font);font-size:14.5px;font-weight:600;color:var(--ink)}
.sel-box input::placeholder{color:var(--faint);font-weight:400}
.sel-box input::-webkit-outer-spin-button,.sel-box input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sel-box .suf{font-size:11px;color:var(--muted);font-weight:600}
.sel-box .chev{position:absolute;right:11px;color:var(--muted);pointer-events:none}
.exp-panel .field > label{font-size:9.5px;margin-bottom:6px}

/* ── estimate disclaimer banner ── */
.est-banner{display:flex;align-items:center;gap:10px;background:#fbf4e4;border:1px solid var(--t3-line);border-radius:var(--r);padding:11px 14px;margin:16px 0}
.est-banner .eb-ico{flex:0 0 auto;color:var(--t3)}
.est-banner .eb-t{font-size:12px;line-height:1.4;color:#6b5310}
.est-banner .eb-t b{font-weight:700;color:#5c4711}

/* ── constraint cycler (callout with nav) ── */
.callout.cyc{flex-direction:column;align-items:stretch;gap:0;padding:0}
.callout.cyc .co-row{display:flex;gap:11px;align-items:flex-start;padding:14px 16px}
.callout.cyc .co-nav{display:flex;align-items:center;gap:8px;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--t3-line)}
.co-nav .cn-lbl{font-size:10.5px;font-weight:700;color:#8a6a14;letter-spacing:.03em;text-transform:uppercase}
.co-nav .cn-btns{display:flex;gap:5px}
.co-nav button{width:24px;height:24px;border-radius:6px;border:1px solid var(--t3-line);background:var(--bg);color:#8a6a14;cursor:pointer;display:flex;align-items:center;justify-content:center}
.co-nav button:hover{border-color:var(--t3);color:#5c4711}

/* ── APR block (NY/CA) ── */
.apr-block{border:1px solid var(--line);border-left:3px solid var(--t2);border-radius:var(--r);padding:14px 16px;margin-top:18px;background:#f7fafd}
.apr-top{display:flex;align-items:baseline;gap:10px;margin-bottom:7px;flex-wrap:wrap}
.apr-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);white-space:nowrap}
.apr-val{font-size:21px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
.apr-state{font-size:10.5px;font-weight:600;color:var(--muted);margin-left:auto;white-space:nowrap}
.apr-why{font-size:11.5px;line-height:1.55;color:var(--ink-2);text-wrap:pretty}
.apr-why b{color:var(--ink);font-weight:700}

/* ── expectation gaps ── */
.gaps{margin-top:20px}
.gaps-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.gaps-head .eyebrow{flex:0 0 auto}
.gaps-head .gh-note{font-size:11px;color:var(--muted);margin-left:auto}
.gap{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px;background:var(--bg)}
.gap.match{background:var(--t1-bg);border-color:var(--t1-line)}
.gap.over,.gap.diff{background:var(--t3-bg);border-color:var(--t3-line)}
.gap.under{background:var(--t2-bg);border-color:var(--t2-line)}
.gap-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:13px;font-weight:800}
.gap.match .gap-ico{background:var(--t1);color:#fff}
.gap.over .gap-ico,.gap.diff .gap-ico{background:var(--t3);color:#fff}
.gap.under .gap-ico{background:var(--t2);color:#fff}
.gap-main{min-width:0}
.gap-top{display:flex;flex-direction:column;gap:3px;margin-bottom:5px}
.gap-lever{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.gap-vs{font-size:12.5px;font-weight:700;color:var(--ink);text-wrap:pretty}
.gap-vs .want{color:var(--ink-2)}
.gap-vs .arr{color:var(--muted);margin:0 5px}
.gap-why{font-size:12px;line-height:1.5;color:var(--ink-2);text-wrap:pretty}
.gap-why b{color:var(--ink);font-weight:700}

/* ── affordability ── */
.afford{border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;margin-top:18px;background:var(--bg)}
.afford-head{display:flex;align-items:baseline;gap:9px;margin-bottom:12px}
.afford-head .ah-t{font-size:12.5px;font-weight:700;color:var(--ink)}
.afford-head .ah-n{font-size:10.5px;color:var(--muted);margin-left:auto}
.afford-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:12px}
.afford-cell .ac-l{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.afford-cell .ac-v{font-size:17px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05}
.afford-cell .ac-v.sm{font-size:14px}
.afford-bar{height:8px;border-radius:5px;background:var(--bg-2);overflow:hidden;margin-bottom:8px;position:relative}
.afford-bar .fill{height:100%;border-radius:5px;transition:width .3s}
.afford-verdict{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
.afford-verdict .av-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.afford-note{font-size:10.5px;line-height:1.5;color:var(--muted);margin-top:9px}

/* ════════ RIGHT · the read ════════ */
.read-eyebrow{margin-bottom:9px}
.hero{margin-bottom:6px}
.hero-num{font-size:56px;font-weight:800;letter-spacing:-.035em;color:var(--green);line-height:1.0;font-variant-numeric:tabular-nums}
.hero-num.muted{color:var(--faint);font-size:30px;font-weight:600;letter-spacing:-.01em}
.hero-sub{font-size:13.5px;color:var(--muted);margin-top:8px}
.hero-sub b{color:var(--ink-2);font-weight:600}
.read-div{height:1px;background:var(--line);margin:20px 0}

/* lever stats */
.levers{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px}
.lever-cell{position:relative}
.lever-cell .lc-lbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.lever-cell .lc-val{font-size:19px;font-weight:700;letter-spacing:-.01em;color:var(--ink);line-height:1.1;font-variant-numeric:tabular-nums}
.lever-cell .lc-val.sm{font-size:15.5px}
.lever-cell .lc-drv{font-size:10.5px;font-weight:600;color:var(--faint);margin-top:4px}
.lever-cell .lc-drv b{color:var(--green)}
.lever-cell .lc-delta{position:absolute;top:-2px;right:0;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;opacity:0;transition:opacity .2s}
.lever-cell .lc-delta.up{color:var(--t1);background:var(--t1-bg)}
.lever-cell .lc-delta.dn{color:var(--t4);background:var(--t4-bg)}
.lever-cell .lc-delta.show{opacity:1}
@keyframes pulseCell{0%{background:var(--green-wash)}100%{background:transparent}}
.lever-cell.pulse{animation:pulseCell 1.1s ease-out;border-radius:7px;margin:-6px;padding:6px}

/* insight callout */
.callout{
  display:flex;gap:11px;align-items:flex-start;background:var(--green-wash);
  border:1px solid var(--green-line);border-left:3px solid var(--green);
  border-radius:var(--r);padding:14px 16px;margin:20px 0 0;
}
.callout.warn{background:var(--t3-bg);border-color:var(--t3-line);border-left-color:var(--t3)}
.callout .co-ico{flex:0 0 auto;margin-top:1px;color:var(--green)}
.callout.warn .co-ico{color:var(--t3)}
.callout .co-txt{font-size:13px;line-height:1.5;color:#274b38}
.callout.warn .co-txt{color:#6b5310}
.callout .co-txt b{font-weight:700}
.callout .co-txt .strong{color:var(--green-dk)}
.callout.warn .co-txt .strong{color:#5c4711}

/* talk track box */
.tt{border:1px solid var(--line);border-left:4px solid var(--green);border-radius:12px;margin-top:20px;overflow:hidden}
.tt-head{display:flex;align-items:center;gap:10px;padding:13px 15px 11px;flex-wrap:wrap}
.tt-head .eyebrow{flex:0 0 auto}
.tt-seg{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px;margin-left:auto}
.tt-seg button{font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:5px 11px;border-radius:6px;transition:all .15s}
.tt-seg button.on{background:var(--bg);color:var(--green);box-shadow:var(--shadow)}
.tt-angle{font-size:10.5px;font-weight:700;color:var(--green);background:var(--green-wash);border:1px solid var(--green-line);border-radius:999px;padding:3px 10px;white-space:nowrap}
.tt-bodywrap{display:flex;align-items:stretch}
.tt-body{flex:1;min-width:0;padding:0 15px}
.tt-side{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:10px 13px;border-left:1px solid var(--line-2)}
.tt-pane{display:none;white-space:pre-wrap;font-size:13.5px;line-height:1.62;color:var(--ink);padding-bottom:13px}
.tt-pane.on{display:block}
.tt-foot{display:flex;align-items:center;gap:10px;padding:11px 15px;border-top:1px solid var(--line-2);background:var(--bg-2)}
.tt-discl{font-size:10.5px;line-height:1.45;color:var(--muted);flex:1}
.tt-cyc{display:flex;align-items:center;gap:5px}
.tt-cyc-lbl{font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;margin-right:2px}
.tt-cyc-btn,.tt-copy{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--bg);color:var(--ink-2);cursor:pointer;transition:all .14s;border-radius:7px}
.tt-cyc-btn{width:26px;height:26px}
.tt-cyc-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-wash)}
.tt-copy{gap:5px;font-size:11.5px;font-weight:600;padding:6px 11px;white-space:nowrap}
.tt-copy:hover{border-color:var(--green);color:var(--green)}
.tt-copy.ok{background:var(--t1-bg);border-color:var(--t1-line);color:var(--t1)}

/* read actions */
.read-acts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;font-weight:700;border-radius:12px;padding:15px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;white-space:nowrap}
.btn span{white-space:nowrap}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn-primary:hover{background:var(--green-dk)}
.btn-primary.ok{background:var(--t1);border-color:var(--t1)}
.btn-ghost{background:var(--bg);color:var(--green);border-color:var(--green-line)}
.btn-ghost:hover{background:var(--green-wash);border-color:var(--green)}

/* read activation empty */
.read-empty{padding:30px 0 0}
.read-empty h1{font-size:27px;font-weight:800;letter-spacing:-.025em;color:var(--ink);line-height:1.12;margin-bottom:13px;text-wrap:balance}
.read-empty h1 em{font-style:normal;color:var(--green)}
.read-empty p{font-size:14px;line-height:1.62;color:var(--ink-2);text-wrap:pretty;max-width:380px}
.re-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}
.re-cell{border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.re-cell .k{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.re-cell .t{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
.re-cell .d{font-size:11.5px;line-height:1.45;color:var(--muted)}

/* ════════ BAND · factor breakdown ════════ */
.band{border-top:1px solid var(--line);background:var(--bg-2);padding:26px var(--pad) 40px}
.band-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.band-head .bt{font-size:14.5px;font-weight:800;letter-spacing:-.01em;color:var(--ink);white-space:nowrap;flex:0 0 auto}
.band-head .bn{font-size:11.5px;color:var(--muted);margin-left:auto;text-align:right}
.fac-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:760px){.fac-grid{grid-template-columns:1fr}}
.fac{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.fac:hover{border-color:#d6d8d0}
.fac.open{box-shadow:var(--shadow-lg);border-color:#d2d4cc}
.fac-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:13px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:15px 16px}
.fac-badge{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex:0 0 auto}
.fac-main{min-width:0}
.fac-main{display:block;min-width:0}
.fac-name-row{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.fac-name{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.fac-owns{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);white-space:nowrap;margin-left:auto}
.fac-val{display:block;font-size:15.5px;font-weight:700;letter-spacing:-.01em;color:var(--ink);line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fac.empty .fac-val{color:var(--faint);font-weight:600}
.fac-impact{display:block;font-size:12px;line-height:1.4;color:var(--ink-2);margin-top:4px;text-wrap:pretty}
.fac-impact b{color:var(--ink);font-weight:600}
.fac-right{display:flex;align-items:center;gap:10px;flex:0 0 auto}
.fac-pill{font-size:10px;font-weight:700;letter-spacing:.03em;padding:4px 10px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
.fac-chev{color:var(--muted);transition:transform .2s}
.fac.open .fac-chev{transform:rotate(180deg)}
.fac-detail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .24s ease}
.fac.open .fac-detail{grid-template-rows:1fr}
.fac-detail-in{overflow:hidden;min-height:0}
.fac-dd{padding:0 16px 16px;border-top:1px solid var(--line-2);margin-top:2px;padding-top:14px}
.fac-logic{font-size:12.5px;line-height:1.6;color:var(--ink-2);text-wrap:pretty}
.fac-logic b{color:var(--ink);font-weight:600}
.fac-cross{display:flex;flex-direction:column;gap:8px;margin-top:13px}
.cross-item{display:flex;gap:10px;align-items:flex-start;font-size:12px;line-height:1.45;padding:10px 12px;border-radius:var(--r-sm);background:var(--bg-2);border:1px solid var(--line)}
.cross-item .ci-ico{flex:0 0 auto;margin-top:1px}
.cross-item.lift{background:var(--t1-bg);border-color:var(--t1-line)}
.cross-item.lift .ci-ico{color:var(--t1)}
.cross-item.drag{background:var(--t4-bg);border-color:var(--t4-line)}
.cross-item.drag .ci-ico{color:var(--t4)}
.cross-item b{font-weight:700}
.cross-item .ci-txt{color:var(--ink-2)}
.cross-item.lift .ci-txt{color:#1c5b3a}
.cross-item.drag .ci-txt{color:#8a2c3c}
/* per-factor talk */
.fac-talk{margin-top:14px;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.fac-talk-head{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg-2);border-bottom:1px solid var(--line-2)}
.fac-talk-head .eyebrow{font-size:9.5px;flex:1}
.fac-talk-seg{display:flex;gap:2px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px}
.fac-talk-seg button{font-size:10px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:4px}
.fac-talk-seg button.on{background:var(--green-wash);color:var(--green)}
.fac-talk-copy{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer}
.fac-talk-copy:hover{border-color:var(--green);color:var(--green)}
.fac-talk-copy.ok{background:var(--t1-bg);border-color:var(--t1-line);color:var(--t1)}
.fac-talk-body{padding:12px;font-size:12.5px;line-height:1.58;color:var(--ink);white-space:pre-wrap}
.fac-pdf{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--green);background:none;border:none;cursor:pointer;margin-top:13px;padding:0;border-bottom:1px dashed var(--green-line)}
.fac-pdf:hover{border-bottom-color:var(--green)}

/* lenders collapsible */
.lenders-sec{margin-top:18px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.lenders-head{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;cursor:pointer;padding:15px 16px;text-align:left}
.lenders-head .lh-t{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap}
.lenders-head .lh-c{font-size:11px;font-weight:600;color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums}
.lenders-head .fac-chev{margin-left:0}
.lenders-body{display:none;padding:0 16px 16px;border-top:1px solid var(--line-2)}
.lenders-sec.open .lenders-body{display:block}
.lenders-sec.open .lenders-head .fac-chev{transform:rotate(180deg)}
.lg{margin-top:13px}
.lg-lbl{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.lg-lbl.spec{color:var(--green)}.lg-lbl.prod{color:var(--muted)}.lg-lbl.rest{color:var(--t4)}
.lg-lbl .c{font-weight:600;color:var(--muted);background:var(--bg-2);border-radius:999px;padding:1px 7px}
.lr{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px}
.lr.spec{background:var(--green-wash);border-color:var(--green-line)}
.lr.fit{box-shadow:inset 3px 0 0 var(--green)}
.lr.below{opacity:.5}
.lr.rest{opacity:.6;background:var(--t4-bg);border-color:var(--t4-line)}
.lr-name{font-size:12.5px;font-weight:600;color:var(--ink);flex:0 0 auto;min-width:118px;display:flex;align-items:center;gap:5px}
.lr.spec .lr-name{color:var(--green-dk)}
.lr-prods{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.lr-chip{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 6px;border-radius:999px;background:var(--bg-2);color:var(--ink-2);border:1px solid var(--line)}
.lr-req{font-size:10px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.lr-tag{font-size:9.5px;font-weight:700;border-radius:999px;padding:2px 8px;white-space:nowrap}
.lr-tag.fit{color:var(--green);background:var(--bg);border:1px solid var(--green-line)}
.lr-tag.below{color:var(--muted);background:var(--bg);border:1px solid var(--line)}
.lr-rest-note{font-size:11px;color:var(--t4);font-weight:600;margin-left:auto}

/* generic warning */
.gwarn{background:var(--t3-bg);border:1px solid var(--t3-line);border-left:3px solid var(--t3);border-radius:var(--r);padding:14px 16px;margin-bottom:18px}
.gwarn .gw-h{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.gwarn .gw-bang{width:20px;height:20px;border-radius:50%;background:var(--t3);color:#fff;font-weight:800;font-size:13px;line-height:20px;text-align:center;flex:0 0 auto}
.gwarn .gw-t{font-size:13px;font-weight:700;color:#6b5310}
.gwarn .gw-b{font-size:12px;line-height:1.55;color:#705a1f}
.gwarn .gw-b b{font-weight:700;color:#5c4711}
.gwarn .gw-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.gwarn .gw-chip{display:inline-flex;align-items:center;gap:7px;font-size:11px;background:var(--bg);border:1px solid var(--t3-line);border-radius:7px;padding:5px 9px;cursor:pointer}
.gwarn .gw-chip:hover{border-color:var(--t3)}
.gwarn .gwc-code{font-family:var(--mono);font-size:10px;font-weight:600;color:#8a6a14}
.gwarn .gwc-dot{width:7px;height:7px;border-radius:50%}

/* ── PDF overlay ── */
.pdf-overlay{position:fixed;inset:0;z-index:120;background:rgba(20,36,29,.5);display:none;flex-direction:column}
.pdf-overlay.open{display:flex}
.pdf-bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:12px 22px;background:var(--bg);border-bottom:1px solid var(--line);flex-wrap:wrap}
.pdf-bar .pb-title{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.pdf-close{font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer}
.pdf-close:hover{border-color:var(--muted)}
.pdf-pick{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px}
.pdf-pick button{font-size:11.5px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 11px;border-radius:6px;transition:all .15s}
.pdf-pick button.on{background:var(--bg);color:var(--green);box-shadow:var(--shadow)}
.pdf-bar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.lang-tg{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
.lang-tg button{font-size:11px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;padding:5px 11px;border-radius:999px}
.lang-tg button.on{background:var(--bg);color:var(--green);box-shadow:var(--shadow)}
.pdf-print{font-size:12.5px;font-weight:700;color:#fff;background:var(--green);border:none;border-radius:8px;padding:8px 15px;cursor:pointer}
.pdf-print:hover{background:var(--green-dk)}
.pdf-scroll{flex:1 1 auto;overflow-y:auto;padding:28px 20px 60px}
.pdf-doc{max-width:680px;margin:0 auto;background:var(--bg);box-shadow:var(--shadow-lg);padding:54px 56px;min-height:600px}
.pd-eyebrow{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:13px}
.pdf-doc h1{font-size:30px;font-weight:800;letter-spacing:-.025em;line-height:1.1;color:var(--ink);margin-bottom:8px;text-wrap:balance}
.pd-sub{font-size:13.5px;color:var(--ink-2);margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--ink)}
.pdf-doc h2{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin:26px 0 11px}
.pdf-doc p{font-size:13px;line-height:1.66;color:var(--ink);margin-bottom:11px;text-wrap:pretty}
.pd-atr{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:6px 0 12px}
.pd-atr.five{grid-template-columns:repeat(2,1fr)}
.pd-cell{border:1px solid var(--line);border-radius:8px;padding:12px 13px;background:var(--bg-2)}
.pd-cell .k{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.pd-cell .v{font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.pd-cell .d{font-size:10px;color:var(--green);font-weight:600;margin-top:3px}
.pd-prod{display:flex;flex-direction:column;gap:7px;margin:4px 0 8px}
.pd-prod-item{display:flex;gap:10px;align-items:baseline;font-size:12.5px;line-height:1.5}
.pd-prod-item .pn{font-weight:700;color:var(--green-dk);flex:0 0 132px}
.pd-foot{margin-top:32px;padding-top:15px;border-top:1px solid var(--line);font-size:10px;line-height:1.55;color:var(--muted)}
.pd-sign{display:flex;justify-content:space-between;gap:18px;margin-top:28px}
.pd-sign .sg{flex:1}.pd-sign .sg-line{border-bottom:1px solid var(--ink);height:32px}
.pd-sign .sg-lbl{font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:5px}

@media print{
  body>*{display:none !important}
  .pdf-overlay{display:block !important;position:static;background:#fff;padding:0}
  .pdf-bar{display:none !important}
  .pdf-scroll{overflow:visible;padding:0}
  .pdf-doc{box-shadow:none;max-width:none;padding:0 6px}
}

/* ── Tweaks panel ── */
#tweaks{position:fixed;right:18px;bottom:18px;z-index:90;width:280px;background:var(--bg);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);display:none;overflow:hidden}
#tweaks.open{display:block}
.tw-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--line-2);cursor:grab}
.tw-head h4{font-size:13px;font-weight:700}
.tw-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;line-height:1;padding:2px 6px;border-radius:6px}
.tw-close:hover{color:var(--ink);background:var(--bg-2)}
.tw-body{padding:13px 15px;max-height:64vh;overflow-y:auto}
.tw-sec{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
.tw-sec:first-child{margin-top:0}
.tw-row{margin-bottom:10px}
.tw-row>label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.seg2{display:flex;background:var(--bg-2);border-radius:8px;padding:3px;gap:2px}
.seg2 button{flex:1;font-size:11.5px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 4px;border-radius:6px;transition:all .15s;text-transform:capitalize}
.seg2 button.on{background:var(--bg);color:var(--ink);box-shadow:var(--shadow)}
.swatches{display:flex;gap:8px}
.swatch{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.swatch:hover{transform:scale(1.08)}
.swatch.on{border-color:var(--ink)}

@media(max-width:880px){
  .split{grid-template-columns:1fr}
  .col-in{border-right:none;border-bottom:1px solid var(--line)}
  .fac-grid{grid-template-columns:1fr}
  .top{grid-template-columns:auto 1fr auto;padding:0 16px}
  .top-title{display:none}
}

/* ═══════════ v4.2 — Payment-Breakdown-aligned refinements ═══════════ */
/* subtle status pills (green) with tone-colored dot */
.tg{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--green-wash);color:var(--green-dk);border:1px solid var(--green-line);white-space:nowrap}
.tg .d{width:7px;height:7px;border-radius:50%;flex:0 0 auto;background:var(--green)}
.tg.err{background:#fbecee;color:#a3303f;border-color:#f1c9cf}
.tg.err .d{background:#cf4b4b}
.fac-pill.tg{font-size:10.5px}

/* industry field — consistent with sibling fields + factory icon */
.ind-chip{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r);min-height:50px;padding:7px 12px}
.ind-chip .in-ico{color:var(--faint);margin-right:0;flex:0 0 auto;display:flex}
.ind-chip-code{font-family:var(--mono);font-size:11.5px;font-weight:600;color:#fff;background:var(--green);border-radius:6px;padding:5px 8px;flex:0 0 auto}
.ind-chip-mid{min-width:0;flex:1}
.ind-chip-name{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--ink);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ind-catch{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#a9750f;background:#f8f1dd;border:1px solid #ebd9a8;border-radius:999px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.ind-change{font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:6px;padding:4px 6px;cursor:pointer;flex:0 0 auto;transition:color .14s}
.ind-change:hover{color:var(--green)}

/* hero + foot disclaimers (quiet, clear) */
.hero-discl{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);margin-top:11px}
.hero-discl svg{color:var(--faint);flex:0 0 auto}
.read-foot-discl{font-size:10.5px;line-height:1.5;color:var(--muted);margin-top:18px;padding-top:14px;border-top:1px solid var(--line-2);text-wrap:pretty}
.read-foot-discl b{color:var(--ink-2)}

/* prominent catch-all warning (purposeful) */
.catch-banner{display:flex;gap:11px;align-items:flex-start;background:#fbf4e4;border:1px solid #ebd9a8;border-left:3px solid #d9a300;border-radius:var(--r);padding:13px 15px;margin-bottom:18px}
.catch-banner .cb-ico{color:#b8860b;flex:0 0 auto;margin-top:1px}
.catch-banner .cb-t{font-size:13px;font-weight:700;color:#7a5e12;margin-bottom:3px}
.catch-banner .cb-b{font-size:12px;line-height:1.5;color:#705a1f;text-wrap:pretty}
.catch-banner .cb-b b{color:#5c4711;font-weight:700}

/* affordability — the green "savings" box, moved up */
.afford{background:var(--green-wash);border:1px solid var(--green-line);border-radius:var(--r);padding:15px 16px;margin-top:20px}
.afford-head .ah-t{color:var(--green-dk)}
.afford-note{color:#5b7a66}

/* APR — calm neutral compliance box */
.apr-block{background:var(--bg-2);border:1px solid var(--line);border-left:3px solid var(--muted);border-radius:var(--r);padding:14px 16px;margin-top:18px}
.apr-label{color:var(--ink-2)!important}
.apr-block .apr-why{color:var(--ink-2)}
.apr-toggle{display:flex;align-items:center;gap:8px;width:100%;font-size:11.5px;font-weight:600;color:var(--muted);background:var(--bg);border:1px dashed var(--line);border-radius:var(--r);padding:11px 13px;cursor:pointer;margin-top:14px;text-align:left}
.apr-toggle:hover{border-color:var(--green-line);color:var(--green-dk)}
.apr-toggle b{color:var(--ink-2);font-weight:700}
.apr-toggle svg{color:var(--faint);flex:0 0 auto}
.apr-toggle.on,.apr-toggle.req{border-style:solid;border-color:#cdd9e3;background:#f7fafd;color:#3f6d8c}
.apr-toggle.req{cursor:default}
.apr-tg-dot{width:7px;height:7px;border-radius:50%;background:#3f6d8c;flex:0 0 auto}
.apr-tg-x{margin-left:auto;font-weight:700;text-decoration:underline}

/* reality check (band) — constraints + gaps, subtle */
.reality{margin-bottom:22px}
.reality-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:13px;align-items:start}
.rc-head{display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:11px}
.rc-nav{display:flex;align-items:center;gap:5px}
.rc-nav button{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--ink-2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.rc-nav button:hover{border-color:var(--green);color:var(--green)}
.rc-nav span{font-size:10px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.cons-box,.gaps-box{background:var(--bg);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px 16px}
.cons-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}
.cons-dot{width:8px;height:8px;border-radius:50%;background:#e0a400;margin-top:5px;flex:0 0 auto}
.cons-txt{font-size:12.5px;line-height:1.55;color:var(--ink-2);text-wrap:pretty}
.cons-txt b{color:var(--ink);font-weight:700}
.gap-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;padding:10px 0;border-top:1px solid var(--line-2)}
.gaps-box .rc-head + .gap-row{border-top:none;padding-top:2px}
.gap-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto}
.gap-vs{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:3px;text-wrap:pretty}
.gap-vs .gap-lever{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-right:7px}
.gap-why{font-size:11.5px;line-height:1.5;color:var(--ink-2);text-wrap:pretty}

/* deposits by month (bank-statement history) */
.dep-wrap{margin-top:2px}
.dep-toggle{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;padding:7px 2px;text-align:left}
.dep-tg-ico{width:19px;height:19px;border-radius:5px;background:var(--green-wash);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex:0 0 auto;line-height:1}
.dep-tg-t{font-size:12px;font-weight:700;color:var(--green-dk)}
.dep-tg-h{font-size:11px;color:var(--muted);font-weight:500}
.dep-toggle .fac-chev{margin-left:auto;color:var(--muted)}
.dep-panel{display:none;margin-top:8px;padding:13px;border:1px solid var(--line);border-radius:var(--r);background:var(--bg-2)}
.dep-panel.open{display:block}
.dep-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px}
.dep-row::-webkit-scrollbar{height:6px}.dep-row::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
.dep-cell{flex:0 0 auto;width:76px}
.dep-cell label{display:block;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;text-align:center}
.dep-cell.mtd label{color:var(--green)}
.dep-in{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--line);border-radius:7px;height:38px;padding:0 8px;transition:border-color .14s,box-shadow .14s}
.dep-cell.mtd .dep-in{border-color:var(--green-line);background:var(--green-wash)}
.dep-in:focus-within{border-color:var(--green);box-shadow:0 0 0 2.5px var(--green-wash)}
.dep-pre{font-size:11px;color:var(--muted);margin-right:1px}
.dep-in input{width:100%;min-width:0;border:none;outline:none;background:none;font-family:var(--font);font-size:13px;font-weight:600;color:var(--ink)}
.dep-in input::placeholder{color:var(--faint)}
.dep-in input::-webkit-outer-spin-button,.dep-in input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.dep-actions{display:flex;align-items:center;gap:11px;margin-top:11px;flex-wrap:wrap}
.dep-more{font-size:11px;font-weight:600;color:var(--green);background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:5px 10px;cursor:pointer}
.dep-more:hover{border-color:var(--green-line);background:var(--green-wash)}
.dep-more:disabled{opacity:.4;cursor:default}
.dep-avg{font-size:11px;font-weight:600;color:var(--ink-2)}
.dep-avg b{color:var(--green-dk)}
.dep-note{font-size:10.5px;line-height:1.5;color:var(--muted);margin-top:10px}
.dep-note b{color:var(--ink-2);font-weight:700}

/* ═══════════ v4.3 — interactive quote, modals, affordability ═══════════ */
/* field alignment: tag flush to right edge across all fields */
.in-field{flex:1;min-width:0;display:flex;align-items:baseline;gap:0}
.in-field input{flex:1;min-width:0;border:none;outline:none;background:none;font-family:var(--font);font-size:16.5px;font-weight:600;color:var(--ink);width:100%}
.in-field input::placeholder{color:var(--faint);font-weight:400}
.in-field input::-webkit-outer-spin-button,.in-field input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.in-field .pre{font-size:15px;color:var(--muted);margin-right:3px}
.in-box .suf{font-size:12.5px;color:var(--muted);font-weight:600;margin-left:7px;flex:0 0 auto}
.suf-toggle{display:inline-flex;align-items:center;gap:3px;border:none;background:none;border-radius:6px;padding:3px 5px;cursor:pointer;font-family:var(--font);color:var(--muted);transition:color .14s}
.suf-toggle:hover{color:var(--green)}
.suf-sw{font-size:9px;opacity:.5}
.in-tag{flex:0 0 auto;margin-left:12px}

/* interactive quote chips */
/* PB-style metric grid */
.qchips{display:grid;grid-template-columns:1fr 1fr;gap:21px 26px;margin-top:22px}
.qchips:has(.qchip:only-child){grid-template-columns:auto;justify-content:start}
.qchip{display:flex;flex-direction:column;gap:7px;align-items:flex-start;text-align:left;background:none;border:none;padding:0;cursor:pointer}
.qc-l{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.qc-v{font-size:23px;font-weight:800;letter-spacing:-.015em;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05;display:inline-flex;align-items:center;gap:4px;transition:color .14s}
.qc-v.sm{font-size:18px}
.qc-go{display:inline-flex;color:var(--faint);opacity:0;transform:rotate(-90deg);transition:opacity .14s,color .14s}
.qchip:hover .qc-v{color:var(--green)}
.qchip:hover .qc-go{opacity:1;color:var(--green)}
.qchips-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:18px}
.qchips-hint svg{color:var(--green);flex:0 0 auto}
.hero-btn{background:none;border:none;cursor:pointer;font:inherit;display:inline-flex;align-items:flex-start;gap:6px;padding:0;color:var(--green);transition:opacity .14s}
.hero-btn:hover{opacity:.78}
.hero-q{display:none}

/* tightest-constraint line */
.constraint-line{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:#fdfaf0;border:1px solid #ecdcad;border-left:4px solid #d9a300;border-radius:12px;padding:14px 16px;margin-top:20px;cursor:pointer;transition:border-color .14s,box-shadow .14s}
.constraint-line:hover{box-shadow:0 3px 14px -6px rgba(217,163,0,.45)}
.cl-dot{width:8px;height:8px;border-radius:50%;background:#e0a400;flex:0 0 auto}
.cl-txt{flex:1;font-size:12px;line-height:1.45;color:#6f5816;text-wrap:pretty}
.cl-txt b{color:#5c4711;font-weight:700}
.cl-more{font-size:10px;font-weight:700;color:#8a6a14;background:#f4e9cc;border-radius:999px;padding:2px 7px;flex:0 0 auto}
.cl-go{color:#b8923a;flex:0 0 auto;transform:rotate(-90deg)}

/* lever modal */
.lm-wrap{position:fixed;inset:0;z-index:80;display:none}
.lm-wrap.open{display:block}
.lm-backdrop{position:absolute;inset:0;background:rgba(17,28,22,.42);backdrop-filter:blur(2px);animation:lmFade .18s ease}
.lm-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(560px,calc(100vw - 36px));max-height:88vh;overflow-y:auto;background:var(--bg);border-radius:16px;box-shadow:0 24px 70px -18px rgba(17,28,22,.5);padding:26px 26px 24px;animation:lmPop .2s cubic-bezier(.2,.9,.3,1.2)}
@keyframes lmFade{from{opacity:0}to{opacity:1}}
@keyframes lmPop{from{opacity:0;transform:translate(-50%,-46%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.lm-x{position:absolute;top:15px;right:16px;width:30px;height:30px;border-radius:8px;border:none;background:var(--bg-2);color:var(--muted);font-size:20px;line-height:1;cursor:pointer;transition:all .14s}
.lm-x:hover{background:var(--line);color:var(--ink)}
.lm-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--green);margin-bottom:7px}
.lm-title{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:baseline;gap:11px;flex-wrap:wrap;margin-bottom:11px}
.lm-val{font-size:16px;font-weight:700;color:var(--green-dk);background:var(--green-wash);border:1px solid var(--green-line);border-radius:999px;padding:3px 12px;font-variant-numeric:tabular-nums}
.lm-driver{font-size:13px;line-height:1.55;color:var(--ink-2);background:var(--bg-2);border-radius:10px;padding:12px 14px;text-wrap:pretty}
.lm-driver b{color:var(--ink);font-weight:700}
.lm-driver-note{display:block;margin-top:5px;font-size:11px;color:var(--muted);font-style:normal}
.lm-body{margin-top:16px}
.lm-logic{font-size:13px;line-height:1.6;color:var(--ink-2);margin-bottom:14px;text-wrap:pretty}
.lm-logic b{color:var(--ink);font-weight:700}
.lm-pay{font-size:14px;color:var(--ink);margin-bottom:14px}
.lm-pay b{font-weight:800}
.lm-gap{border-radius:10px;padding:12px 14px;margin-bottom:14px;border:1px solid}
.lm-gap.match{background:var(--t1-bg);border-color:var(--t1-line)}
.lm-gap.over,.lm-gap.diff{background:var(--t3-bg);border-color:var(--t3-line)}
.lm-gap.under{background:var(--t2-bg);border-color:var(--t2-line)}
.lm-gap-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
.lm-gap-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:0 0 auto;opacity:.7}
.lm-gap-why{font-size:12px;line-height:1.5;color:var(--ink-2);text-wrap:pretty}
.lm-body .fac-cross{margin:0 0 14px}
.lm-body .fac-talk{margin-top:4px}

/* affordability v2 — collapsible */
.aff-wrap{margin-top:16px;border:1px solid var(--green-line);border-radius:var(--r);background:var(--green-wash);overflow:hidden}
.aff-toggle{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;cursor:pointer;padding:14px 16px;text-align:left}
.aff-tg-l{font-size:13px;font-weight:700;color:var(--green-dk);flex:1}
.aff-verdict-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:999px;border:1px solid;background:var(--bg)}
.aff-verdict-pill .d{width:7px;height:7px;border-radius:50%}
.aff-toggle .fac-chev{color:var(--green);flex:0 0 auto}
.aff-panel{display:none;padding:0 16px 16px}
.aff-wrap.open .aff-panel{display:block}
.aff-verdict-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:13px}
.aff-verdict-row .av-dot{width:9px;height:9px;border-radius:50%}
.aff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:13px}
.aff-cell{background:var(--bg);border:1px solid var(--green-line);border-radius:10px;padding:11px 13px}
.aff-cell .ac-l{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.aff-cell .ac-v{font-size:18px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05}
.aff-cell .ac-s{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:500}
.aff-bar{height:9px;border-radius:5px;background:var(--bg);border:1px solid var(--green-line);overflow:hidden;margin-bottom:5px}
.aff-bar .fill{height:100%;border-radius:5px;transition:width .35s}
.aff-scale{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-bottom:13px}
.aff-be{display:flex;gap:10px;align-items:flex-start;background:var(--bg);border:1px solid var(--green-line);border-radius:10px;padding:12px 13px;font-size:12px;line-height:1.5;color:var(--ink-2);margin-bottom:11px;text-wrap:pretty}
.aff-be b{color:var(--ink);font-weight:700}
.aff-be-ico{color:var(--green);flex:0 0 auto;margin-top:1px}
.aff-conf{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;line-height:1.45;color:var(--ink-2);padding:9px 11px;border-radius:9px;background:var(--bg);border:1px solid var(--green-line);margin-bottom:10px}
.aff-conf .d{width:8px;height:8px;border-radius:50%;background:var(--green);flex:0 0 auto;margin-top:4px}
.aff-conf.warn{background:#fdfaf0;border-color:#ecdcad;color:#6f5816}
.aff-conf.warn .d{background:#e0a400}
.aff-conf b{font-weight:700}
.aff-conf.warn b{color:#5c4711}
.aff-empty{display:flex;gap:11px;align-items:flex-start;font-size:12.5px;line-height:1.55;color:var(--ink-2);padding-top:2px}
.aff-empty svg{color:var(--green);flex:0 0 auto;margin-top:2px}
.aff-empty b{color:var(--ink);font-weight:700}
.aff-note{font-size:10.5px;line-height:1.5;color:var(--muted);text-wrap:pretty}

/* ═══════════ v4.6 — offer box, product tile, lavender affordability ═══════════ */
:root{ --lav:#f5f2fc; --lav-line:#e1dbf4; --lav-ink:#4a3f7a; --lav-accent:#7c6bb0; }
/* consistent industry chip (mirrors the number fields) */
.ind-box{display:flex;align-items:center;gap:11px;height:auto;min-height:54px;padding-top:9px;padding-bottom:9px;cursor:default}
.ind-field{display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:0;flex:1}
.ind-name{width:100%;font-size:14px;font-weight:700;color:var(--ink);line-height:1.25;letter-spacing:-.01em;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ind-code{font-family:var(--mono);font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.02em}
.ind-box .in-ico{color:var(--faint);flex:0 0 auto;display:flex}
.ind-box .in-tag{flex:0 0 auto}
.ind-box .ind-change{flex:0 0 auto}

/* light-green offer box */
.offer-box{margin-top:20px;border:1px solid var(--green-line);border-radius:14px;background:var(--green-wash);padding:16px}
.offer-head{display:flex;gap:9px;align-items:flex-start;margin-bottom:14px}
.oh-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;margin-top:5px}
.oh-txt{font-size:13.5px;line-height:1.5;font-weight:600;color:var(--green-dk);text-wrap:pretty}
.offer-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.offer-grid.one{grid-template-columns:1fr;max-width:280px}
.off-tile{display:flex;flex-direction:column;gap:7px;align-items:flex-start;text-align:left;background:var(--bg);border:1px solid var(--green-line);border-radius:11px;padding:13px 14px;cursor:pointer;min-height:94px;transition:border-color .14s,box-shadow .14s}
.off-tile:hover{border-color:var(--green);box-shadow:0 3px 12px -6px rgba(21,102,60,.4)}
.ot-l{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.ot-v{font-size:22px;font-weight:800;letter-spacing:-.015em;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.08}
.ot-v.sm{font-size:16px}
.prod-tile{cursor:default;gap:6px}
.prod-tile .ot-top{display:flex;align-items:center;justify-content:space-between;width:100%}
.prod-cyc{display:flex;gap:3px}
.prod-cyc button{width:23px;height:23px;border-radius:6px;border:1px solid var(--green-line);background:var(--bg);color:var(--green);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .14s}
.prod-cyc button:hover{background:var(--green-wash);border-color:var(--green)}
.ot-v-btn{background:none;border:none;padding:0;cursor:pointer;text-align:left}
.ot-v-btn:hover .ot-v{color:var(--green)}
.prod-q{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-2)}
.pq-dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.offer-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:#5b7a66;margin-top:13px}
.offer-hint svg{color:var(--green);flex:0 0 auto}

/* affordability → lavender */
.aff-wrap{border-color:var(--lav-line);background:var(--lav)}
.aff-tg-l{color:var(--lav-ink)!important}
.aff-toggle .fac-chev{color:var(--lav-accent)}
.aff-cell{border-color:var(--lav-line)}
.aff-bar{border-color:var(--lav-line)}
.aff-be{border-color:var(--lav-line)}
.aff-be-ico{color:var(--lav-accent)}
.aff-conf{border-color:var(--lav-line)}
.aff-conf .d{background:var(--lav-accent)}
.aff-conf.warn{background:#efeafb;border-color:var(--lav-line);color:var(--lav-ink)}
.aff-conf.warn .d{background:var(--lav-accent)}
.aff-conf.warn b{color:var(--lav-ink)}
.aff-empty svg{color:var(--lav-accent)}
.aff-empty b{color:var(--lav-ink)}
.aff-note{color:#6f6790}

/* ═══════════ v4.7 — clickable factor tags + paged lever modal ═══════════ */
/* profile tags become tappable — they explain what the factor affects */
.tg-btn{cursor:pointer;font-family:var(--font);transition:border-color .14s,background .14s}
.tg-btn:hover{border-color:var(--green);background:var(--bg)}
.tg-btn .tg-go{display:inline-flex;color:currentColor;opacity:.5;margin-left:-1px}
.tg-btn:hover .tg-go{opacity:1}
.tg.err.tg-btn{}

/* paged lever modal — less up front, cycle for more */
.lm-page{margin-top:16px;min-height:92px}
.lm-page .fac-talk{margin-top:0}
.lm-pager{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line-2)}
.lm-pg-lbl{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.lm-pg-nav{display:flex;align-items:center;gap:7px;flex:0 0 auto}
.lm-pg-nav button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink-2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .14s}
.lm-pg-nav button:hover{border-color:var(--green);color:var(--green);background:var(--green-wash)}
.lm-pg-count{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;min-width:36px;text-align:center}

/* ═══════════ v4.8 — amount-led grid, rate units, click-to-edit, cost compare ═══════════ */
/* uniform tile value size (kill the auto-shrink that made tiles look mismatched) */
.off-tile .ot-v,.off-tile .ot-v.sm{font-size:21px;line-height:1.12;white-space:nowrap}
/* amount becomes the lead tile, full width + slightly larger */
.amount-tile{grid-column:1 / -1}
.amount-tile .ot-v,.amount-tile .ot-v.sm{font-size:28px;letter-spacing:-.02em;white-space:nowrap}
.amt-detail{display:none;font-size:11.5px;line-height:1.5;color:#5b7a66;margin-top:6px;text-wrap:pretty}
.amt-detail b{color:var(--green-dk);font-weight:700}
.amount-tile.open .amt-detail{display:block}
.ot-top{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px;min-height:25px}
.ot-toggle{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--green);background:var(--bg);border:1px solid var(--green-line);border-radius:999px;padding:3px 9px;cursor:pointer;letter-spacing:.02em;white-space:nowrap;transition:all .14s;font-family:var(--font)}
.ot-toggle:hover{background:var(--green-wash);border-color:var(--green)}
.ot-toggle .tg-go{display:inline-flex}
.ot-cap{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.01em;margin-top:3px}

/* cost compare (RBF/MCA vs line of credit) */
.cmp-intro{font-size:12.5px;line-height:1.58;color:var(--ink-2);margin-bottom:14px;text-wrap:pretty}
.cmp-intro b{color:var(--ink);font-weight:700}
.cmp-tbl{display:grid;grid-template-columns:1.25fr 1fr 1fr 1fr;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.cmp-tbl>div{padding:9px 10px;border-bottom:1px solid var(--line-2);font-size:12px;display:flex;flex-direction:column;justify-content:center}
.cmp-tbl .ch{background:var(--bg-2);font-weight:700;color:var(--muted);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;text-align:center}
.cmp-tbl .ch.lead{text-align:left}
.cmp-tbl .rl{font-weight:700;color:var(--ink);font-size:12.5px}
.cmp-tbl .cv{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink-2);text-align:center}
.cmp-tbl .cv.fixed{color:var(--green-dk)}
.cmp-tbl .cv.win{background:var(--green-wash);color:var(--green-dk)}
.cmp-tbl>div:nth-last-child(-n+4){border-bottom:none}
.cmp-note{font-size:10.5px;line-height:1.5;color:var(--muted);margin-top:12px;text-wrap:pretty}
.cmp-note b{color:var(--ink-2);font-weight:700}
.offer-compare{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--green);background:var(--bg);border:1px solid var(--green-line);border-radius:8px;padding:9px 13px;cursor:pointer;margin-top:12px;transition:all .14s;font-family:var(--font)}
.offer-compare:hover{background:var(--green-wash);border-color:var(--green)}

/* industry chip → click anywhere to change */
.ind-box{cursor:pointer}
.ind-box:hover{border-color:var(--green-line)}
.ind-edit-hint{flex:0 0 auto;display:inline-flex;align-items:center;color:var(--faint);transition:color .14s}
.ind-box:hover .ind-edit-hint{color:var(--green)}

/* cost-compare controls (editable APR + month gates) */
.cmp-controls{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;margin-bottom:13px;padding:11px 13px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px}
.cmp-ctl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.cmp-ctl.gates{flex-wrap:wrap}
.cmp-in,.cmp-gate{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:3px 8px;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);font-weight:600}
.cmp-in input,.cmp-gate input{width:42px;border:none;outline:none;background:none;font-family:var(--font);font-size:13px;font-weight:700;color:var(--ink);text-align:right}
.cmp-in input::-webkit-outer-spin-button,.cmp-in input::-webkit-inner-spin-button,.cmp-gate input::-webkit-outer-spin-button,.cmp-gate input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cmp-gates{display:inline-flex;flex-wrap:wrap;gap:6px;align-items:center}
.cmp-gate button{border:none;background:none;color:var(--faint);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 2px}
.cmp-gate button:hover{color:var(--t4)}
.cmp-add{font-size:13px;font-weight:700;color:var(--green);background:var(--bg);border:1px dashed var(--green-line);border-radius:7px;padding:2px 9px;cursor:pointer;line-height:1.3}
.cmp-add:hover{background:var(--green-wash);border-style:solid}

/* ═══════════ v4.9 — handoff v2: funding-range gate, stacked rate, horizontal modal ═══════════ */
/* passive requested-vs-modeled signal on a tile face (information, not warning) */
.tile-req{font-size:12px;font-weight:600;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums}
/* funding range — locked until 2+ months of deposits */
.amount-tile.locked{background:var(--bg-2);border-color:var(--line);cursor:default}
.amount-tile.locked:hover{border-color:var(--line);box-shadow:none}
.amount-tile.locked .ot-l{color:var(--faint)}
.amt-locked{font-size:13.5px;line-height:1.45;color:var(--muted);font-weight:600;margin-top:2px;text-wrap:pretty}
.amt-locked b{color:var(--ink-2);font-weight:700}
/* stacked rate metrics — cents primary, factor + APR muted */
.rate-tile .rate-sub{font-size:12px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;line-height:1.4;margin-top:1px;white-space:nowrap}
.rate-tile .rate-apr{font-size:11px;display:flex;align-items:center;flex-wrap:wrap;gap:5px;white-space:normal}
.rate-apr-pill{font-size:9px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--t2);background:var(--t2-bg);border:1px solid var(--t2-line);border-radius:999px;padding:1px 6px}
/* persistent MCA disambiguation below the rate row */
.mca-note{font-size:11.5px;line-height:1.45;color:#5b7a66;margin-top:11px;font-weight:500;text-wrap:pretty}
/* cash-flow-check collapsed break-even summary */
.aff-summary{font-size:11.5px;line-height:1.45;color:var(--lav-ink);padding:0 16px 13px;margin-top:-2px;text-wrap:pretty}
.aff-summary b{font-weight:700}
.aff-wrap.open .aff-summary{display:none}
/* business-state must be confirmed before export */
.sel-box.need{border-color:var(--t3)!important;box-shadow:0 0 0 3px var(--t3-bg)}
.state-need-note{font-size:11px;font-weight:600;color:#a9750f;margin-top:6px}
/* vertical lever modal — verdict, expandable teasers, fine print pinned at the bottom */
.lm-verdict{font-size:15px;line-height:1.6;color:var(--ink);margin-top:14px;text-wrap:pretty}
.lm-verdict b{font-weight:800;color:var(--green-dk)}
.lm-teasers{margin-top:16px;display:flex;flex-direction:column;gap:9px}
.lm-teaser{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--bg);transition:border-color .15s}
.lm-teaser[open]{border-color:var(--green-line)}
.lm-teaser-sum{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;font-size:13px;font-weight:700;color:var(--ink);list-style:none}
.lm-teaser-sum::-webkit-details-marker{display:none}
.lm-teaser-sum::marker{content:''}
.lm-teaser-sum>span:first-child{flex:1;text-wrap:pretty}
.lm-teaser-sum:hover{color:var(--green-dk)}
.lm-teaser-chev{color:var(--muted);display:inline-flex;transition:transform .2s;flex:0 0 auto}
.lm-teaser[open] .lm-teaser-chev{transform:rotate(180deg)}
.lm-teaser-body{padding:13px 15px 15px;border-top:1px solid var(--line-2)}
.lm-teaser-body .lm-gap{margin:0}
.lm-teaser-body .cmp{margin:0}
.lm-teaser-body .lm-logic{font-size:13px;line-height:1.6;color:var(--ink-2);text-wrap:pretty}
.lm-fineprint{margin-top:18px;padding-top:13px;border-top:1px solid var(--line-2);font-size:11.5px;line-height:1.55;color:var(--muted);text-wrap:pretty}
.lm-fp-label{display:block;font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}

/* ── Product keynote — hero above the metric tiles ── */
.kn-wrap{margin-bottom:14px}
.kn-eyebrow{margin-bottom:9px}
.kn-row{display:flex;flex-wrap:wrap;gap:10px}
.kn-card{flex:1;min-width:100px;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r);padding:13px 14px 11px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s;font-family:var(--font)}
.kn-card:hover{border-color:var(--green-line);box-shadow:0 2px 8px rgba(20,60,30,.07)}
.kn-lead{border-color:var(--green-line);background:var(--green-wash)}
.kn-card-top{min-height:18px;margin-bottom:5px}
.kn-lead-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);background:rgba(21,102,60,.12);border-radius:999px;padding:2px 8px}
.kn-name{font-size:20px;font-weight:800;letter-spacing:-.025em;color:var(--ink);line-height:1.15;margin-bottom:7px}
.kn-status{display:flex;align-items:center;gap:6px}
.kn-dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.kn-word{font-size:11.5px;font-weight:700}
.kn-caution{display:flex;align-items:flex-start;gap:5px;margin-top:7px;font-size:10.5px;font-weight:600;color:var(--t3);line-height:1.4}
.kn-caution svg{flex:0 0 auto;margin-top:1px;color:var(--t3)}
/* offer-metrics: keep 2x2 via existing .offer-grid 1fr 1fr */
</style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the Waitlist — LendPaper</title>
  <meta property="og:title" content="You're on the Waitlist — LendPaper" />
  <meta property="og:description" content="You're queued for the next LendPaper cohort. Questions? Email hello@lendpaper.com" />
  <meta property="og:image" content="https://lendpaper.com/public/assets/brand/og-image.png" />
  <meta property="og:url" content="https://lendpaper.com/waitlist" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lendpaper.com/public/assets/brand/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="/public/assets/brand/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8FAF7; --card: #FFFFFF; --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.12);
      --brand: #1A3C2E; --brand-mid: #2D6A4F; --brand-light: #34A878;
      --gold: #B8870A; --gold-bg: rgba(184,135,10,0.07); --gold-bd: rgba(184,135,10,0.2);
      --text: #0D1A10; --muted: #6B7C70; --muted2: #3D5445;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(26,60,46,0.032) 1px, transparent 1px), linear-gradient(90deg, rgba(26,60,46,0.032) 1px, transparent 1px); background-size: 52px 52px; }
    #waveBg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .glow { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 600px; height: 320px; background: radial-gradient(ellipse, rgba(52,168,120,0.11) 0%, transparent 68%); pointer-events: none; z-index: 0; animation: breathe 7s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.06)} }
    .page { position: relative; z-index: 1; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,0.055); animation: riseIn .42s cubic-bezier(.22,1,.36,1) both; }
    @keyframes riseIn { from{opacity:0;transform:translateY(16px) scale(.99)} to{opacity:1;transform:none} }
    .logo { display: flex; align-items: center; justify-content: center; gap: 9px; margin-bottom: 26px; }
    .logo-mark { width: 28px; height: 28px; border-radius: 7px; overflow: hidden; }
    .logo-word { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; color: var(--text); letter-spacing: -0.02em; }
    .logo-word span { color: var(--brand-mid); }
    .icon-wrap { width: 58px; height: 58px; background: rgba(184,135,10,0.08); border: 1px solid rgba(184,135,10,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; animation: iconIn .5s .12s cubic-bezier(.22,1,.36,1) both; }
    @keyframes iconIn { from{opacity:0;transform:scale(.75)} to{opacity:1;transform:scale(1)} }
    .icon-wrap svg { width: 26px; height: 26px; stroke: var(--gold); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.025em; color: var(--text); margin-bottom: 10px; }
    .body-text { font-size: 14px; color: var(--muted2); line-height: 1.65; margin-bottom: 6px; }
    .body-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .badge { display: inline-flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--brand-mid); background: rgba(45,106,79,0.07); border: 1px solid rgba(45,106,79,0.2); padding: 5px 13px; border-radius: 100px; letter-spacing: .04em; margin-bottom: 26px; }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--brand-light); animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .card-footer { border-top: 1px solid var(--border); padding-top: 20px; }
    .card-footer p { font-size: 12.5px; color: var(--muted); line-height: 1.6; }
    .card-footer a { color: var(--brand-mid); text-decoration: none; font-weight: 500; transition: opacity .18s; }
    .card-footer a:hover { opacity: .75; }
  </style>
</head>
<body>
  <canvas id="waveBg"></canvas>
  <div class="glow"></div>
  <div class="page">
    <div class="card">
      <div class="logo">
        <canvas class="logo-mark" id="logoMark" width="28" height="28"></canvas>
        <div class="logo-word">lend<span>paper</span>.</div>
      </div>
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2v10l4 2"/><circle cx="12" cy="12" r="10"/></svg>
      </div>
      <h1>You're on the waitlist.</h1>
      <p class="body-text">This cohort is full, but you're automatically queued for the next one.</p>
      <p class="body-sub">We open spots on a rolling basis. When one opens, you'll be notified — no action needed on your end.</p>
      <div class="badge"><span class="badge-dot"></span>Next spots opening soon</div>
      <div class="card-footer">
        <p>Questions? Reach out at <a href="mailto:hello@lendpaper.com">hello@lendpaper.com</a></p>
      </div>
    </div>
  </div>
  <script>
  (function(){
    const cv=document.getElementById('waveBg'),ctx=cv.getContext('2d');let f=0,raf;
    function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
    const WS=[{yF:.58,amp:.055,freq:.007,spd:.20,a:.050},{yF:.70,amp:.040,freq:.010,spd:-.17,a:.036},{yF:.44,amp:.050,freq:.006,spd:.13,a:.042},{yF:.80,amp:.030,freq:.012,spd:.28,a:.026},{yF:.36,amp:.044,freq:.008,spd:-.11,a:.033}];
    function draw(){const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);const t=f*.018;WS.forEach(w=>{ctx.beginPath();ctx.strokeStyle=`rgba(26,60,46,${w.a})`;ctx.lineWidth=.9;for(let x=0;x<=W;x+=3){const y=w.yF*H+Math.sin(x*w.freq+t*w.spd)*w.amp*H;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();});f++;raf=requestAnimationFrame(draw);}
    draw();document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else{f=0;draw();}});
    const lc=document.getElementById('logoMark');if(lc){const lx=lc.getContext('2d');let lf=0;(function ld(){const S=28;lx.clearRect(0,0,S,S);lx.save();lx.beginPath();const r=7;lx.moveTo(r,0);lx.lineTo(S-r,0);lx.quadraticCurveTo(S,0,S,r);lx.lineTo(S,S-r);lx.quadraticCurveTo(S,S,S-r,S);lx.lineTo(r,S);lx.quadraticCurveTo(0,S,0,S-r);lx.lineTo(0,r);lx.quadraticCurveTo(0,0,r,0);lx.closePath();lx.clip();const g=lx.createLinearGradient(0,0,0,S);g.addColorStop(0,'#01170e');g.addColorStop(1,'#043220');lx.fillStyle=g;lx.fillRect(0,0,S,S);const t2=lf*.025;[[.485,.12,1,'rgba(8,48,32,.95)'],[.547,.15,-.85,'rgba(16,80,56,.85)'],[.422,.18,1.35,'rgba(52,168,120,.7)']].forEach(([yf,fr,spd,col],i)=>{lx.fillStyle=col;lx.beginPath();lx.moveTo(0,S);for(let x=0;x<=S;x++)lx.lineTo(x,S*yf+Math[i===1?'cos':'sin'](x*fr+t2*spd)*S*.138);lx.lineTo(S,S);lx.fill();});lx.restore();lx.save();const bob=Math.sin(lf*.08)*.6;lx.translate(0,bob);const sc=S/24;lx.scale(sc,sc);lx.shadowColor='rgba(0,0,0,.35)';lx.shadowBlur=1.5;lx.shadowOffsetY=.5;lx.strokeStyle='rgba(255,255,255,.52)';lx.lineWidth=1.7;lx.lineCap='round';lx.lineJoin='round';lx.beginPath();lx.moveTo(4,4);lx.lineTo(4,20);lx.lineTo(15,20);lx.lineTo(20,15);lx.lineTo(20,4);lx.closePath();lx.stroke();lx.beginPath();lx.moveTo(15,20);lx.lineTo(15,15);lx.lineTo(20,15);lx.stroke();lx.beginPath();lx.moveTo(9,9);lx.lineTo(9,15);lx.lineTo(14,15);lx.stroke();lx.restore();lf++;requestAnimationFrame(ld);})();}
  })();
  </script>
</body>
</html>

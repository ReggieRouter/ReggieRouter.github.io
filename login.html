<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LendPaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --border: #1e2535;
      --gold: #e8b84b;
      --gold-dim: rgba(232, 184, 75, 0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Background grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,184,75,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,184,75,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232,184,75,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--bg);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-google {
      width: 100%;
      padding: 14px 20px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }

    .btn-google:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-google:active { transform: translateY(0); }

    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    input[type="email"] {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus { border-color: var(--gold); }
    input[type="email"]::placeholder { color: var(--muted); }

    .btn-magic {
      padding: 12px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-magic:hover { border-color: var(--gold); color: var(--gold); }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      display: block;
    }

    .footer-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding-top: 24px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .footer-link a {
      color: var(--gold);
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }

    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">LP</div>
      <span class="logo-text">LendPaper</span>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Early access members only. Use the button below to sign in with your Google account.</p>

    <div id="message" class="message"></div>

    <button class="btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#1a1a2e"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#1a1a2e"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#1a1a2e"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#1a1a2e"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <div class="input-group">
      <input type="email" id="emailInput" placeholder="you@company.com" />
      <button class="btn-magic" id="magicBtn">Send link</button>
    </div>
    <p class="hint">We'll email you a magic sign-in link. No password needed.</p>

    <div class="footer-link">
      Don't have access? <a href="/early-access.html">Request early access →</a>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm" } }
  </script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const msg = document.getElementById('message');

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = `message ${type}`;
    }

    // Google OAuth
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      btn.classList.add('loading');
      btn.textContent = 'Redirecting...';
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/auth-callback.html' }
      });
      if (error) {
        showMessage(error.message, 'error');
        btn.classList.remove('loading');
        btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18">...</svg> Continue with Google`;
      }
    });

    // Magic link
    document.getElementById('magicBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) { showMessage('Please enter your email address.', 'error'); return; }
      const btn = document.getElementById('magicBtn');
      btn.textContent = 'Sending...';
      btn.classList.add('loading');
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + '/auth-callback.html' }
      });
      if (error) {
        showMessage(error.message, 'error');
      } else {
        showMessage(`Magic link sent to ${email}. Check your inbox.`, 'success');
      }
      btn.textContent = 'Send link';
      btn.classList.remove('loading');
    });

    // If already logged in, redirect
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/auth-callback.html';
  </script>
</body>
</html>

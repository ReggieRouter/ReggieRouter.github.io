<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LendPaper</title>
  <meta property="og:title" content="Sign In — LendPaper" />
  <meta property="og:description" content="Sign in to LendPaper. Questions? Email hello@lendpaper.com" />
  <meta property="og:image" content="https://lendpaper.com/public/assets/brand/og-image.png" />
  <meta property="og:url" content="https://lendpaper.com/login" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lendpaper.com/public/assets/brand/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="/public/assets/brand/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wdth,wght@125,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8FAF7; --card: #FFFFFF; --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.12);
      --brand: #1A3C2E; --brand-mid: #2D6A4F; --brand-light: #34A878;
      --text: #0D1A10; --muted: #6B7C70; --muted2: #3D5445;
      --err-bg: rgba(220,38,38,0.05); --err-bd: rgba(220,38,38,0.18); --err-txt: #B91C1C;
      --ok-bg: rgba(52,168,120,0.07); --ok-bd: rgba(52,168,120,0.22); --ok-txt: #1A5C3A;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(26,60,46,0.032) 1px, transparent 1px), linear-gradient(90deg, rgba(26,60,46,0.032) 1px, transparent 1px); background-size: 52px 52px; }
    #waveBg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .glow { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 600px; height: 320px; background: radial-gradient(ellipse, rgba(52,168,120,0.11) 0%, transparent 68%); pointer-events: none; z-index: 0; animation: breathe 7s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.06)} }
    .page { position: relative; z-index: 1; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; box-shadow: 0 4px 32px rgba(0,0,0,0.055); animation: riseIn .42s cubic-bezier(.22,1,.36,1) both; }
    @keyframes riseIn { from{opacity:0;transform:translateY(16px) scale(.99)} to{opacity:1;transform:none} }

    /* ── LOGO ── */
    .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 28px; }
    .logo-mark { width: 28px; height: 28px; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
    .logo-word { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
    .logo-word span { color: var(--brand-mid); }

    /* ── HEADING ── */
    h1 {
      font-family: 'Anybody', sans-serif;
      font-stretch: 125%;
      font-weight: 700;
      font-size: 27px;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 6px;
    }
    .sub { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin-bottom: 26px; }

    /* ── MESSAGES ── */
    .msg { padding: 10px 13px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; display: none; }
    .msg.error { background: var(--err-bg); border: 1px solid var(--err-bd); color: var(--err-txt); display: block; }
    .msg.ok    { background: var(--ok-bg);  border: 1px solid var(--ok-bd);  color: var(--ok-txt);  display: block; }

    /* ── OAUTH BUTTONS ── */
    .oauth-stack { display: flex; flex-direction: column; gap: 10px; }

    .btn-oauth {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 16px;
      color: #fff; border: none; border-radius: 11px;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
      cursor: pointer; letter-spacing: -0.01em;
      transition: opacity .18s, transform .12s, box-shadow .18s;
    }
    .btn-oauth:hover { opacity: .88; transform: translateY(-1px); }
    .btn-oauth:active { transform: none; opacity: 1; }
    .btn-oauth:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-oauth .provider-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-google { background: var(--brand); }
    .btn-google:hover { box-shadow: 0 6px 20px rgba(26,60,46,0.18); }

    /* ── DIVIDER ── */
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 11px; letter-spacing: .06em; color: var(--muted); white-space: nowrap; font-weight: 500; }

    /* ── MAGIC LINK ── */
    .email-row { display: flex; gap: 8px; }
    .email-row input {
      flex: 1; padding: 11px 13px;
      background: var(--bg); border: 1px solid var(--border-mid); border-radius: 9px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
      outline: none; transition: border-color .18s, box-shadow .18s; min-width: 0;
    }
    .email-row input:focus { border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(52,168,120,0.1); }
    .email-row input::placeholder { color: var(--muted); opacity: .65; }
    .btn-magic {
      padding: 11px 16px; background: var(--bg); border: 1px solid var(--border-mid);
      border-radius: 9px; color: var(--text); font-family: 'Inter', sans-serif;
      font-weight: 500; font-size: 13.5px; cursor: pointer; white-space: nowrap;
      flex-shrink: 0; transition: background .18s, border-color .18s;
    }
    .btn-magic:hover { background: #EFF1EE; border-color: rgba(0,0,0,0.18); }
    .btn-magic:disabled { opacity: .5; cursor: not-allowed; }
    .email-hint { font-size: 11.5px; color: var(--muted); margin-top: 7px; line-height: 1.5; }

    /* ── FORGOT EMAIL ── */
    .forgot-note {
      margin-top: 10px; font-size: 11.5px; color: var(--muted);
      line-height: 1.5;
    }
    .forgot-note a { color: var(--brand-mid); text-decoration: none; font-weight: 500; }
    .forgot-note a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    .card-footer { border-top: 1px solid var(--border); margin-top: 22px; padding-top: 18px; text-align: center; }
    .card-footer a { font-size: 14px; color: var(--brand-mid); font-weight: 500; text-decoration: none; transition: color .18s, opacity .18s; }
    .card-footer a:hover { opacity: .75; }
  </style>
</head>
<body>
  <canvas id="waveBg"></canvas>
  <div class="glow"></div>

  <div class="page">
    <div class="card">

      <div class="logo">
        <canvas class="logo-mark" id="logoMark" width="28" height="28"></canvas>
        <div class="logo-word">lend<span>paper</span>.</div>
      </div>

      <h1>Let's get you in.</h1>
      <p class="sub">Early access members only.</p>

      <div id="msg" class="msg"></div>

      <button class="btn-oauth btn-google" id="googleBtn">
        <svg class="provider-icon" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>OR EMAIL ME A SIGN-IN LINK</span></div>

      <div class="email-row">
        <input type="email" id="emailInput" placeholder="you@company.com" autocomplete="email" />
        <button class="btn-magic" id="magicBtn">Send link</button>
      </div>
      <p class="email-hint">One-click sign-in sent to your inbox — no password needed.</p>
      <p class="forgot-note">
        Can't access this email?
        <a href="mailto:hello@lendpaper.com?subject=Sign-in%20help">hello@lendpaper.com</a>
      </p>

      <div class="card-footer">
        <a href="/early-access.html">Request early access →</a>
      </div>

    </div>
  </div>

  <!-- Wave + logo mark animation -->
  <script>
  (function(){
    const cv=document.getElementById('waveBg'),ctx=cv.getContext('2d');let f=0,raf;
    function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
    const WS=[{yF:.58,amp:.055,freq:.007,spd:.20,a:.050},{yF:.70,amp:.040,freq:.010,spd:-.17,a:.036},{yF:.44,amp:.050,freq:.006,spd:.13,a:.042},{yF:.80,amp:.030,freq:.012,spd:.28,a:.026},{yF:.36,amp:.044,freq:.008,spd:-.11,a:.033}];
    function draw(){const W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);const t=f*.018;WS.forEach(w=>{ctx.beginPath();ctx.strokeStyle=`rgba(26,60,46,${w.a})`;ctx.lineWidth=.9;for(let x=0;x<=W;x+=3){const y=w.yF*H+Math.sin(x*w.freq+t*w.spd)*w.amp*H;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();});f++;raf=requestAnimationFrame(draw);}
    draw();document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else{f=0;draw();}});
    const lc=document.getElementById('logoMark');if(lc){const lx=lc.getContext('2d');let lf=0;(function ld(){const S=28;lx.clearRect(0,0,S,S);lx.save();lx.beginPath();const r=7;lx.moveTo(r,0);lx.lineTo(S-r,0);lx.quadraticCurveTo(S,0,S,r);lx.lineTo(S,S-r);lx.quadraticCurveTo(S,S,S-r,S);lx.lineTo(r,S);lx.quadraticCurveTo(0,S,0,S-r);lx.lineTo(0,r);lx.quadraticCurveTo(0,0,r,0);lx.closePath();lx.clip();const g=lx.createLinearGradient(0,0,0,S);g.addColorStop(0,'#01170e');g.addColorStop(1,'#043220');lx.fillStyle=g;lx.fillRect(0,0,S,S);const t2=lf*.025;[[.485,.12,1,'rgba(8,48,32,.95)'],[.547,.15,-.85,'rgba(16,80,56,.85)'],[.422,.18,1.35,'rgba(52,168,120,.7)']].forEach(([yf,fr,spd,col],i)=>{lx.fillStyle=col;lx.beginPath();lx.moveTo(0,S);for(let x=0;x<=S;x++)lx.lineTo(x,S*yf+Math[i===1?'cos':'sin'](x*fr+t2*spd)*S*.138);lx.lineTo(S,S);lx.fill();});lx.restore();lx.save();const bob=Math.sin(lf*.08)*.6;lx.translate(0,bob);const sc=S/24;lx.scale(sc,sc);lx.shadowColor='rgba(0,0,0,.35)';lx.shadowBlur=1.5;lx.shadowOffsetY=.5;lx.strokeStyle='rgba(255,255,255,.52)';lx.lineWidth=1.7;lx.lineCap='round';lx.lineJoin='round';lx.beginPath();lx.moveTo(4,4);lx.lineTo(4,20);lx.lineTo(15,20);lx.lineTo(20,15);lx.lineTo(20,4);lx.closePath();lx.stroke();lx.beginPath();lx.moveTo(15,20);lx.lineTo(15,15);lx.lineTo(20,15);lx.stroke();lx.beginPath();lx.moveTo(9,9);lx.lineTo(9,15);lx.lineTo(14,15);lx.stroke();lx.restore();lf++;requestAnimationFrame(ld);})();}
    window.showMsg=(t,k)=>{const e=document.getElementById('msg');e.textContent=t;e.className='msg '+k;};
    window.clearMsg=()=>{document.getElementById('msg').className='msg';};
  })();
  </script>

  <script type="importmap">{"imports":{"@supabase/supabase-js":"https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"}}</script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data:{ session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/auth-callback.html';
    const REDIR = window.location.origin + '/auth-callback.html';

    // Google
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true; btn.textContent = 'Opening Google...'; clearMsg();
      const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: REDIR } });
      if (error) { btn.disabled = false; btn.textContent = 'Continue with Google'; showMsg(error.message, 'error'); }
    });

    // Magic link
    const magicBtn = document.getElementById('magicBtn');
    const emailInput = document.getElementById('emailInput');
    async function sendMagic() {
      const email = emailInput.value.trim();
      if (!email || !email.includes('@')) { showMsg('Enter a valid email address.', 'error'); return; }
      magicBtn.disabled = true; magicBtn.textContent = 'Sending...'; clearMsg();
      const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: REDIR } });
      if (error) { magicBtn.disabled = false; magicBtn.textContent = 'Send link'; showMsg(error.message, 'error'); }
      else { magicBtn.textContent = 'Sent ✓'; emailInput.disabled = true; showMsg('Check your inbox — expires in 10 minutes.', 'ok'); }
    }
    magicBtn.addEventListener('click', sendMagic);
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMagic(); });
  </script>
</body>
</html>

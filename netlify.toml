# ── Block internal folders from public access ───────────────────────────────
[[redirects]]
  from   = "/archive/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/markdowns/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/scrapers/*"
  to     = "/404.html"
  status = 404
  force  = true

# ── Cache headers (all HTML pages) ─────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# ── Security headers — portal (was /admin) ──────────────────────────────────
[[headers]]
  for = "/lp-panel"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer"
    Cache-Control             = "no-store, no-cache, must-revalidate, private"
    Content-Security-Policy   = "default-src 'self' https://cdn.jsdelivr.net https://*.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; font-src 'self' data:;"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"
    X-Permitted-Cross-Domain-Policies = "none"

[[headers]]
  for = "/lp-panel.html"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer"
    Cache-Control             = "no-store, no-cache, must-revalidate, private"
    Content-Security-Policy   = "default-src 'self' https://cdn.jsdelivr.net https://*.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; font-src 'self' data:;"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"
    X-Permitted-Cross-Domain-Policies = "none"

# ── Security headers — hiring portal (was /recruiter) ───────────────────────
[[headers]]
  for = "/lp-hire"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer"
    Cache-Control             = "no-store, no-cache, must-revalidate, private"
    Content-Security-Policy   = "default-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:;"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"
    X-Permitted-Cross-Domain-Policies = "none"

[[headers]]
  for = "/lp-hire.html"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer"
    Cache-Control             = "no-store, no-cache, must-revalidate, private"
    Content-Security-Policy   = "default-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:;"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"
    X-Permitted-Cross-Domain-Policies = "none"

# ── Protected portal rewrites (serve .html file at clean path) ──────────────
[[redirects]]
  from   = "/lp-hire"
  to     = "/lp-hire.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/lp-panel"
  to     = "/lp-panel.html"
  status = 200
  force  = true

# ── Admin dashboard — folded into lp-panel Members tab (LEN-84) ─────────────
[[redirects]]
  from   = "/admin"
  to     = "/lp-panel.html"
  status = 301
  force  = true

[[redirects]]
  from   = "/admin.html"
  to     = "/lp-panel.html"
  status = 301
  force  = true

# ── Dead-end redirects for old URLs (404 — reveals nothing) ─────────────────
[[redirects]]
  from   = "/recruiter"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/recruiter.html"
  to     = "/404.html"
  status = 404
  force  = true

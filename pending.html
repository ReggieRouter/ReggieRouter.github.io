<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — LendPaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/public/assets/brand/favicon.svg">
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1c1c26;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --brand: #1A3C2E;
      --brand-mid: #2D6A4F;
      --gold: #D4A017;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.50);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(45,106,79,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 16px; padding: 56px 48px; width: 100%; max-width: 480px;
      position: relative; z-index: 1; text-align: center; animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
    .logo { margin-bottom: 40px; display: flex; justify-content: center; }
    .logo img { height: 28px; width: auto; }
    .icon {
      width: 64px; height: 64px;
      background: rgba(45,106,79,0.15); border: 0.5px solid rgba(74,222,128,0.2);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; font-size: 28px;
    }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
    p { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; font-weight: 400; }
    .contact {
      font-size: 13px; color: var(--muted); margin-top: 32px; padding-top: 24px;
      border-top: 0.5px solid var(--border);
    }
    .contact a { color: rgba(255,255,255,0.78); text-decoration: none; }
    .contact a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/public/assets/brand/logo-lockup-dark.svg" alt="LendPaper" height="28">
    </div>
    <div class="icon">⏳</div>
    <h1>You're on the list.</h1>
    <p>We manually review each application to keep LendPaper's early access community tight and valuable.</p>
    <p>You'll hear from us shortly — usually within 24 hours.</p>
    <div class="contact">
      Questions? <a href="mailto:hello@lendpaper.com">hello@lendpaper.com</a>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm" } }
  </script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    setInterval(async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return;
      const { data: profile } = await supabase.from('profiles').select('status').eq('id', session.user.id).single();
      if (profile?.status === 'approved') window.location.href = '/index.html';
    }, 30000);
  </script>
</body>
</html>

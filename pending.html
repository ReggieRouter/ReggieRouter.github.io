<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — LendPaper</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0d14; --surface:#111520; --border:#1e2535; --gold:#e8b84b; --text:#e2e8f0; --muted:#64748b; }
    body {
      background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:linear-gradient(rgba(232,184,75,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(232,184,75,0.03) 1px, transparent 1px);
      background-size:48px 48px; pointer-events:none;
    }
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:56px 48px; width:100%; max-width:480px;
      position:relative; z-index:1; text-align:center; animation:fadeUp 0.4s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
    .icon {
      width:64px; height:64px; background:rgba(232,184,75,0.12);
      border:1px solid rgba(232,184,75,0.3); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 28px; font-size:28px;
    }
    h1 { font-family:'Syne',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.03em; margin-bottom:16px; }
    p { font-size:15px; color:var(--muted); line-height:1.7; margin-bottom:12px; }
    .contact { font-size:13px; color:var(--muted); margin-top:32px; padding-top:24px; border-top:1px solid var(--border); }
    .contact a { color:var(--gold); text-decoration:none; }
    .contact a:hover { text-decoration:underline; }
    .logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:40px; }
    .logo-mark { width:32px; height:32px; background:var(--gold); border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:14px; color:var(--bg); }
    .logo-text { font-family:'Syne',sans-serif; font-weight:700; font-size:18px; letter-spacing:-0.02em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">LP</div>
      <span class="logo-text">LendPaper</span>
    </div>
    <div class="icon">⏳</div>
    <h1>You're on the list.</h1>
    <p>We manually review each application to keep LendPaper's early access community tight and valuable.</p>
    <p>You'll hear from us shortly — usually within 24 hours.</p>
    <div class="contact">
      Questions? <a href="mailto:steve@lendpaper.com">steve@lendpaper.com</a>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm" } }
  </script>
  <script type="module">
    import { createClient } from '@supabase/supabase-js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // Poll every 30s — if approved, redirect automatically
    setInterval(async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return;
      const { data: profile } = await supabase.from('profiles').select('status').eq('id', session.user.id).single();
      if (profile?.status === 'approved') window.location.href = '/index.html';
    }, 30000);
  </script>
</body>
</html>
